<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026-05-27 探索内容包装截图汇总</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
      line-height: 1.6;
    }
    main { max-width: 1180px; margin: 0 auto; padding: 28px 20px 44px; }
    h1 { margin: 0 0 8px; color: #f8d37a; font-size: 24px; }
    .summary { margin: 0 0 22px; color: #a9b7d0; }
    article {
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.82);
      padding: 14px;
      margin: 18px 0;
    }
    h2 { margin: 0 0 6px; color: #f8d37a; font-size: 18px; }
    p { margin: 0 0 12px; color: #cbd5e1; }
    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #020617;
    }
  </style>
</head>
<body>
  <main>
    <h1>探索内容包装 · 2026-05-27</h1>
    <p class="summary">覆盖派遣简报、每日探索余波、判定现场对白、结算线索奖励四个玩家真实会经过的状态。</p>

    <article>
      <h2>01 派遣简报</h2>
      <p>派遣配置页顶部新增调查简报、目标和压力，让任务在组骰池前就有具体报道语境。</p>
      <img src="01-dispatch-story-brief.png" alt="派遣配置页中的调查简报截图" />
    </article>

    <article>
      <h2>02 每日探索余波</h2>
      <p>每日弹窗保留普通文本池，同时少量概率显示与执行中任务相关的探索余波。</p>
      <img src="02-day-exploration-afterglow.png" alt="每日推进弹窗中的探索余波截图" />
    </article>

    <article>
      <h2>03 判定现场对白</h2>
      <p>骰子判定弹窗增加短对白，和摇骰 / 选择计入阶段绑定，后续重投接入时复用这个槽位。</p>
      <img src="03-dice-scene-dialogue.png" alt="骰子判定弹窗中的现场对白截图" />
    </article>

    <article>
      <h2>04 线索奖励文案</h2>
      <p>结算奖励不再只显示通用 Tier 文案，而是使用任务专属线索标题和描述。</p>
      <img src="04-clue-reward-story.png" alt="结算奖励弹窗中的任务专属线索文案截图" />
    </article>
  </main>
</body>
</html>
