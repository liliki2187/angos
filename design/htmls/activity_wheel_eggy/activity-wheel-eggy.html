<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蛋仔跳跳乐</title>
  <style>
    :root {
      --w: 375px;
      --h: 840px;
      --shadow-green: rgba(23, 74, 44, 0.28);
      --font: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #7fb47c;
      font-family: var(--font);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .app {
      position: relative;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: #7dc08c;
    }

    .scene-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      position: absolute;
      width: 252px;
      left: 61px;
      top: 43px;
      filter: drop-shadow(0 4px 0 rgba(27, 94, 77, 0.08));
    }

    .top-progress {
      position: absolute;
      left: 16px;
      top: 126px;
      width: 344px;
      height: 82px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .round-badge {
      position: relative;
      width: 48px;
      height: 62px;
      text-align: center;
      color: #fff5de;
      text-shadow: 0 2px 0 rgba(130, 64, 20, 0.35);
      font-weight: 800;
      flex: none;
    }

    .round-badge img {
      position: absolute;
      inset: 0 auto auto 0;
      width: 48px;
      height: 48px;
    }

    .round-badge .num {
      position: absolute;
      inset: 7px 0 auto;
      font-size: 20px;
      letter-spacing: 0.3px;
    }

    .round-badge .label {
      position: absolute;
      inset: 49px 0 auto;
      font-size: 13px;
      font-weight: 700;
      color: #fffce7;
      text-shadow: 0 1px 0 rgba(49, 100, 54, 0.42);
    }

    .progress-line {
      position: absolute;
      left: 54px;
      top: 11px;
      width: 278px;
      height: 20px;
      opacity: 0.85;
    }

    .progress-line .bg,
    .progress-line .bar {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .progress-line .bar {
      width: 62px;
    }

    .milestones {
      position: relative;
      flex: 1;
      height: 76px;
      display: flex;
      justify-content: space-between;
      padding-top: 4px;
      padding-right: 2px;
    }

    .milestone {
      position: relative;
      width: 53px;
      text-align: center;
      color: #f8f5e5;
      text-shadow: 0 2px 0 rgba(40, 73, 43, 0.45);
      font-weight: 800;
      font-size: 13px;
    }

    .milestone .card {
      position: relative;
      width: 48px;
      height: 48px;
      margin: 0 auto 3px;
      border-radius: 9px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.23), rgba(64, 82, 52, 0.28));
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 7px 16px rgba(36, 62, 42, 0.18);
      backdrop-filter: blur(2px);
    }

    .milestone.done .card {
      background: linear-gradient(180deg, rgba(72, 85, 56, 0.86), rgba(57, 72, 45, 0.92));
      border-color: rgba(255, 255, 255, 0.12);
    }

    .milestone.active .card {
      box-shadow:
        inset 0 0 0 2px rgba(255, 240, 179, 0.7),
        0 0 0 2px rgba(253, 222, 107, 0.46),
        0 6px 16px rgba(54, 77, 44, 0.22);
    }

    .milestone .icon {
      position: absolute;
      left: 8px;
      top: 7px;
      width: 32px;
      height: 32px;
    }

    .milestone .label {
      line-height: 1;
    }

    .reward-icon {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .reward-icon.medallion {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(250, 252, 242, 0.78);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.35), 0 3px 6px rgba(31, 69, 47, 0.18);
    }

    .reward-icon.medallion::before {
      content: "";
      position: absolute;
      inset: 7px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-right-color: transparent;
      border-radius: 50%;
      transform: rotate(24deg);
    }

    .reward-icon.medallion::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      right: 7px;
      top: 8px;
      background: rgba(255, 255, 255, 0.7);
    }

    .reward-icon.medallion.green {
      background: radial-gradient(circle at 35% 30%, #d7f8d8, #89dbab 34%, #56a676 70%, #3a7e58 100%);
    }

    .reward-icon.medallion.blue {
      background: radial-gradient(circle at 35% 30%, #d9f1ff, #91caff 34%, #6593e8 70%, #4d6eb9 100%);
    }

    .reward-icon.coin {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffe5b3, #f2bd74 45%, #ca8148 100%);
      border: 2px solid rgba(255, 243, 216, 0.7);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.4), 0 3px 6px rgba(99, 56, 28, 0.18);
    }

    .reward-icon.coin::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 2px solid rgba(191, 112, 64, 0.48);
      border-radius: 50%;
    }

    .reward-icon.coin::after {
      content: "✦";
      position: absolute;
      inset: 4px 0 0;
      text-align: center;
      color: #c76d44;
      font-size: 14px;
      font-weight: 900;
    }

    .reward-icon.paw {
      width: 30px;
      height: 24px;
    }

    .reward-icon.paw::before {
      content: "";
      position: absolute;
      left: 7px;
      bottom: 2px;
      width: 16px;
      height: 14px;
      border-radius: 52% 52% 44% 44%;
      background: currentColor;
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.25);
    }

    .reward-icon.paw::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 2px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow:
        7px -1px 0 currentColor,
        14px -1px 0 currentColor,
        21px 1px 0 currentColor;
    }

    .reward-icon.paw.gold {
      color: #f3c56b;
      filter: drop-shadow(0 2px 2px rgba(138, 85, 43, 0.2));
    }

    .reward-icon.paw.orange {
      color: #efb165;
      filter: drop-shadow(0 2px 2px rgba(138, 85, 43, 0.2));
    }

    .reward-icon.fire {
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%) rotate(-14deg);
    }

    .reward-icon.fire::before {
      content: "";
      position: absolute;
      inset: 3px 5px 2px 4px;
      border-radius: 55% 45% 60% 40% / 65% 35% 60% 40%;
      background: linear-gradient(180deg, #ffb36b 0%, #f66d50 45%, #c44739 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.28);
    }

    .reward-icon.fire::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 7px;
      width: 8px;
      height: 8px;
      border-radius: 50% 50% 60% 40%;
      background: rgba(255, 241, 210, 0.68);
      box-shadow:
        6px 2px 0 -1px rgba(255, 241, 210, 0.48),
        -2px 8px 0 -2px rgba(255, 241, 210, 0.3);
    }

    .reward-icon.magic {
      width: 32px;
      height: 32px;
    }

    .reward-icon.magic::before {
      content: "";
      position: absolute;
      left: 7px;
      top: 7px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff4cf, #f3c86d 16%, #d774f0 48%, #8a66db 100%);
      border: 2px solid rgba(255, 241, 199, 0.7);
      box-shadow: 0 3px 5px rgba(90, 58, 124, 0.18);
    }

    .reward-icon.magic::after {
      content: "";
      position: absolute;
      left: 18px;
      top: 5px;
      width: 3px;
      height: 24px;
      background: linear-gradient(180deg, #ffeeb0, #d69046);
      border-radius: 3px;
      transform: rotate(38deg);
      box-shadow:
        3px -1px 0 0 rgba(255, 236, 163, 0.8),
        -7px 8px 0 -1px rgba(255, 236, 163, 0.72);
    }

    .reward-icon.chest {
      width: 30px;
      height: 24px;
      border-radius: 5px;
      background: linear-gradient(180deg, #ffd882 0%, #e6a95b 100%);
      border: 2px solid rgba(255, 243, 200, 0.7);
      box-shadow: 0 3px 6px rgba(128, 77, 35, 0.22);
    }

    .reward-icon.chest::before {
      content: "";
      position: absolute;
      left: 1px;
      right: 1px;
      top: -3px;
      height: 12px;
      border-radius: 6px 6px 4px 4px;
      background: linear-gradient(180deg, #fff0a9 0%, #efbf67 100%);
      border: 2px solid rgba(255, 243, 200, 0.7);
    }

    .reward-icon.chest::after {
      content: "";
      position: absolute;
      left: 11px;
      top: 7px;
      width: 6px;
      height: 10px;
      border-radius: 2px;
      background: #d0833f;
      box-shadow: 0 0 0 2px rgba(255, 235, 183, 0.45);
    }

    .board {
      position: absolute;
      left: 14px;
      top: 228px;
      width: 346px;
      height: 390px;
    }

    .board-bg {
      position: absolute;
      left: 0;
      top: 0;
      width: 346px;
      height: 346px;
      object-fit: contain;
      opacity: 0.78;
      filter: drop-shadow(0 14px 14px rgba(47, 76, 53, 0.18));
    }

    .slot {
      position: absolute;
      width: 58px;
      height: 58px;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .slot img.tile {
      position: absolute;
      inset: 0;
      width: 58px;
      height: 58px;
    }

    .slot.active {
      transform: scale(1.04);
      filter: drop-shadow(0 0 10px rgba(255, 235, 124, 0.8));
    }

    .slot.active .select-light {
      opacity: 1;
    }

    .select-light {
      position: absolute;
      inset: -4px;
      width: 66px;
      height: 66px;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .slot-icon {
      position: absolute;
      left: 11px;
      top: 10px;
      width: 34px;
      height: 34px;
    }

    .slot-icon.small {
      left: 13px;
      top: 13px;
      width: 30px;
      height: 30px;
    }

    .marker {
      position: absolute;
      width: 68px;
      height: 82px;
      left: 0;
      top: 0;
      transition: transform 220ms cubic-bezier(.2, .8, .2, 1);
      pointer-events: none;
      z-index: 5;
    }

    .marker .bubble {
      position: absolute;
      left: 6px;
      top: 12px;
      width: 56px;
      height: 66px;
      transform: rotate(5deg);
      filter: drop-shadow(0 5px 8px rgba(96, 49, 115, 0.16));
    }

    .marker .chick {
      position: absolute;
      left: 19px;
      top: 27px;
      width: 30px;
      height: 30px;
    }

    .marker .dec-a {
      position: absolute;
      left: 8px;
      top: 42px;
      width: 15px;
      height: 15px;
      transform: rotate(-18deg);
    }

    .marker .dec-b {
      position: absolute;
      left: 10px;
      top: 50px;
      width: 24px;
      height: 24px;
      opacity: 0.88;
    }

    .start-node {
      position: absolute;
      left: -16px;
      top: 244px;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start-node .ring,
    .start-node .base {
      position: absolute;
      inset: 0;
      width: 80px;
      height: 80px;
    }

    .start-node .base {
      inset: 8px;
      width: 64px;
      height: 64px;
      left: 8px;
      top: 8px;
    }

    .start-node .born-icon {
      position: absolute;
      top: 18px;
      width: 28px;
      height: 28px;
      opacity: 0.72;
    }

    .start-node .text {
      position: absolute;
      top: 42px;
      font-size: 19px;
      font-weight: 900;
      color: #7baf42;
      text-shadow: 0 2px 0 rgba(231, 255, 198, 0.9);
    }

    .skip {
      position: absolute;
      right: 20px;
      top: 589px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ecf2c3;
      text-shadow: 0 2px 0 rgba(47, 83, 32, 0.42);
      font-size: 14px;
      font-weight: 700;
    }

    .skip img {
      width: 18px;
      height: 18px;
    }

    .footer {
      position: absolute;
      inset: auto 0 0 0;
      height: 214px;
    }

    .back {
      position: absolute;
      left: 18px;
      bottom: 66px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.18), rgba(66, 95, 93, 0.8));
      border: 2px solid rgba(216, 229, 193, 0.24);
      box-shadow: 0 6px 12px rgba(23, 58, 57, 0.2);
    }

    .back::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 12px;
      width: 11px;
      height: 11px;
      border-left: 3px solid #f2ebcf;
      border-bottom: 3px solid #f2ebcf;
      transform: rotate(45deg);
    }

    .dice-panel {
      position: absolute;
      right: 18px;
      bottom: 58px;
      width: 247px;
      height: 130px;
    }

    .dice-panel .panel-bg {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 247px;
      height: 83px;
    }

    .wallet {
      position: absolute;
      left: 0;
      bottom: 3px;
      width: 122px;
      height: 66px;
    }

    .wallet .count-bg {
      position: absolute;
      left: 4px;
      top: 4px;
      width: 97px;
      height: 27px;
    }

    .wallet .count {
      position: absolute;
      left: 15px;
      top: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #eaf0c5;
      font-weight: 800;
      font-size: 14px;
      text-shadow: 0 2px 0 rgba(36, 53, 22, 0.3);
    }

    .wallet .caption {
      color: #e1efbb;
    }

    .ticket {
      position: relative;
      width: 14px;
      height: 11px;
      background: linear-gradient(180deg, #ffd6d6, #ff8c8c);
      border-radius: 4px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .ticket::before,
    .ticket::after {
      content: "";
      position: absolute;
      top: 3px;
      width: 4px;
      height: 4px;
      background: #26492c;
      border-radius: 50%;
    }

    .ticket::before {
      left: -2px;
    }

    .ticket::after {
      right: -2px;
    }

    .wallet .get-more {
      position: absolute;
      left: 14px;
      bottom: 2px;
      width: 84px;
      height: 31px;
      border: 0;
      border-radius: 7px;
      background: linear-gradient(180deg, #ffef9c, #eab25f);
      color: #7a4a1c;
      font-weight: 900;
      font-size: 12px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55), 0 2px 0 rgba(88, 55, 19, 0.35);
    }

    .dice-launch {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 126px;
      height: 126px;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .dice-launch .dice-img {
      position: absolute;
      right: 13px;
      bottom: 3px;
      width: 95px;
      height: 95px;
      filter: drop-shadow(0 6px 12px rgba(59, 61, 16, 0.22));
      transition: transform 160ms ease;
    }

    .dice-launch.rolling .dice-img {
      animation: diceWobble 240ms linear infinite;
    }

    .times-bubble {
      position: absolute;
      right: 1px;
      top: 12px;
      width: 54px;
      height: 54px;
    }

    .times-bubble .orb,
    .times-bubble .rim {
      position: absolute;
      inset: 0;
      width: 54px;
      height: 54px;
    }

    .times-bubble .text {
      position: absolute;
      inset: 14px 0 0;
      text-align: center;
      color: #f9faf8;
      font-weight: 900;
      font-size: 23px;
      text-shadow: 0 2px 0 rgba(47, 104, 178, 0.45);
      letter-spacing: -1px;
    }

    .star {
      position: absolute;
      opacity: 0.98;
      animation: twinkle 1.6s ease-in-out infinite;
    }

    .star.s0 { right: 83px; top: 1px; width: 15px; height: 15px; animation-delay: 0s; }
    .star.s1 { right: 96px; top: 23px; width: 16px; height: 16px; animation-delay: 0.3s; }
    .star.s2 { right: 8px; top: 55px; width: 14px; height: 14px; animation-delay: 0.6s; }
    .star.s3 { right: 88px; top: 63px; width: 18px; height: 18px; animation-delay: 0.9s; }

    @keyframes twinkle {
      0%,
      100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.16); opacity: 0.7; }
    }

    @keyframes diceWobble {
      0% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(7deg) translateY(-2px); }
      50% { transform: rotate(-5deg) translateY(1px); }
      75% { transform: rotate(4deg) translateY(-1px); }
      100% { transform: rotate(0deg) translateY(0); }
    }
  </style>
</head>
<body>
  <main class="app">
    <img class="scene-bg" src="./bg_activity_wheel.png" alt="" />
    <img class="title" src="./img_activity_wheel_title.png" alt="蛋仔跳跳乐" />

    <section class="top-progress">
      <div class="round-badge">
        <img src="./pnl_activity_wheel_prg.png" alt="" />
        <div class="num">45</div>
        <div class="label">圈数</div>
      </div>

      <div class="milestones">
        <div class="progress-line">
          <img class="bg" src="./prg_activity_wheel_bg.png" alt="" />
          <img class="bar" src="./prg_activity_wheel_bar.png" alt="" />
        </div>

        <div class="milestone done">
          <div class="card"><img class="icon" src="./icon_activity_wheel_tick.png" alt="" /></div>
          <div class="label">15圈</div>
        </div>
        <div class="milestone active">
          <div class="card"><div class="reward-icon medallion green"></div></div>
          <div class="label">30圈</div>
        </div>
        <div class="milestone">
          <div class="card"><div class="reward-icon medallion blue"></div></div>
          <div class="label">50圈</div>
        </div>
        <div class="milestone">
          <div class="card"><div class="reward-icon fire"></div></div>
          <div class="label">60圈</div>
        </div>
        <div class="milestone">
          <div class="card"><div class="reward-icon chest"></div></div>
          <div class="label">75圈</div>
        </div>
      </div>
    </section>

    <section class="board" id="board">
      <img class="board-bg" src="./pnl_activity_wheel_bg.png" alt="" />

      <div class="slot" data-track="1" style="left:28px; top:28px;">
        <img class="tile" src="./img_activity_wheel_item_yellow.png" alt="" />
        <img class="select-light" src="./img_activity_wheel_light_sel.png" alt="" />
        <div class="reward-icon fire"></div>
      </div>
      <div class="slot" data-track="2" style="left:92px; top:28px;">
        <img class="tile" src="./img_activity_wheel_item_white.png" alt="" />
      </div>
      <div class="slot" data-track="3" style="left:156px; top:28px;">
        <img class="tile" src="./img_activity_wheel_item_blue.png" alt="" />
        <div class="reward-icon coin"></div>
      </div>
      <div class="slot" data-track="4" style="left:220px; top:28px;">
        <img class="tile" src="./img_activity_wheel_item_yellow.png" alt="" />
        <img class="select-light" src="./img_activity_wheel_light_sel.png" alt="" />
        <div class="reward-icon magic"></div>
      </div>

      <div class="slot" data-track="5" style="left:280px; top:92px;">
        <img class="tile" src="./img_activity_wheel_item_white.png" alt="" />
      </div>
      <div class="slot" data-track="6" style="left:280px; top:156px;">
        <img class="tile" src="./img_activity_wheel_item_blue.png" alt="" />
        <div class="reward-icon coin"></div>
      </div>
      <div class="slot" data-track="7" style="left:280px; top:220px;">
        <img class="tile" src="./img_activity_wheel_item_white.png" alt="" />
      </div>
      <div class="slot" data-track="8" style="left:280px; top:284px;">
        <img class="tile" src="./img_activity_wheel_item_yellow.png" alt="" />
        <img class="select-light" src="./img_activity_wheel_light_sel.png" alt="" />
        <div class="reward-icon paw orange"></div>
      </div>

      <div class="slot" data-track="9" style="left:280px; top:340px;">
        <img class="tile" src="./img_activity_wheel_item_yellow.png" alt="" />
        <img class="select-light" src="./img_activity_wheel_light_sel.png" alt="" />
        <div class="reward-icon chest"></div>
      </div>
      <div class="slot" data-track="10" style="left:220px; top:340px;">
        <img class="tile" src="./img_activity_wheel_item_white.png" alt="" />
      </div>
      <div class="slot" data-track="11" style="left:156px; top:340px;">
        <img class="tile" src="./img_activity_wheel_item_blue.png" alt="" />
        <div class="reward-icon paw gold"></div>
      </div>
      <div class="slot" data-track="12" style="left:92px; top:340px;">
        <img class="tile" src="./img_activity_wheel_item_white.png" alt="" />
      </div>

      <div class="slot" data-track="13" style="left:28px; top:276px;">
        <img class="tile" src="./img_activity_wheel_item_blue.png" alt="" />
        <div class="reward-icon paw orange"></div>
      </div>
      <div class="slot" data-track="14" style="left:28px; top:212px;">
        <img class="tile" src="./img_activity_wheel_item_white.png" alt="" />
      </div>
      <div class="slot" data-track="15" style="left:28px; top:148px;">
        <img class="tile" src="./img_activity_wheel_item_blue.png" alt="" />
        <div class="reward-icon coin"></div>
      </div>

      <div class="start-node">
        <img class="ring" src="./img_activity_wheel_light_born.png" alt="" />
        <img class="base" src="./img_activity_wheel_item_born.png" alt="" />
        <img class="born-icon" src="./icon_activity_wheel_born.png" alt="" />
        <div class="text">起点</div>
      </div>

      <div class="marker" id="marker">
        <img class="bubble" src="./pnl_activity_wheel_pos.png" alt="" />
        <img class="chick" src="./icon_activity_wheel_pos.png" alt="" />
        <img class="dec-a" src="./img_activity_wheel_pos_dec_0.png" alt="" />
        <img class="dec-b" src="./img_activity_wheel_pos_dec_1.png" alt="" />
      </div>
    </section>

    <div class="skip">
      <img src="./icon_activity_wheel_tick.png" alt="" />
      <span>跳过动画</span>
    </div>

    <footer class="footer">
      <button class="back" type="button" aria-label="返回"></button>

      <section class="dice-panel">
        <img class="panel-bg" src="./pnl_activity_wheel_btn.png" alt="" />

        <div class="wallet">
          <img class="count-bg" src="./pnl_activity_wheel_price.png" alt="" />
          <div class="count">
            <span class="caption">拥有：</span>
            <span class="ticket"></span>
            <span>210</span>
          </div>
          <button class="get-more" type="button">获取更多</button>
        </div>

        <button class="dice-launch" id="diceLaunch" type="button" aria-label="掷骰子">
          <img class="dice-img" id="diceImg" src="./img_activity_wheel_dice_big_01.png" alt="" />
          <div class="times-bubble">
            <img class="rim" src="./pnl_activity_wheel_times.png" alt="" />
            <img class="orb" src="./img_activity_wheel_times.png" alt="" />
            <div class="text">x1</div>
          </div>
          <img class="star s0" src="./img_activity_wheel_dec_star_0.png" alt="" />
          <img class="star s1" src="./img_activity_wheel_dec_star_1.png" alt="" />
          <img class="star s2" src="./img_activity_wheel_dec_star_3.png" alt="" />
          <img class="star s3" src="./img_activity_wheel_dec_star_2.png" alt="" />
        </button>
      </section>
    </footer>
  </main>

  <script>
    const diceFaces = [
      "./img_activity_wheel_dice_big_01.png",
      "./img_activity_wheel_dice_big_02.png",
      "./img_activity_wheel_dice_big_03.png",
      "./img_activity_wheel_dice_big_04.png",
      "./img_activity_wheel_dice_big_05.png",
      "./img_activity_wheel_dice_big_06.png"
    ];

    const marker = document.getElementById("marker");
    const diceLaunch = document.getElementById("diceLaunch");
    const diceImg = document.getElementById("diceImg");
    const slots = [...document.querySelectorAll(".slot")];
    const trackOrder = [
      { x: 210, y: 292, slot: 10 },
      { x: 146, y: 292, slot: 11 },
      { x: 82, y: 292, slot: 12 },
      { x: 18, y: 228, slot: 13 },
      { x: 18, y: 164, slot: 14 },
      { x: 18, y: 100, slot: 15 },
      { x: 18, y: -20, slot: 1 },
      { x: 82, y: -20, slot: 2 },
      { x: 146, y: -20, slot: 3 },
      { x: 210, y: -20, slot: 4 },
      { x: 270, y: 44, slot: 5 },
      { x: 270, y: 108, slot: 6 },
      { x: 270, y: 172, slot: 7 },
      { x: 270, y: 236, slot: 8 },
      { x: 270, y: 292, slot: 9 }
    ];

    let activeIndex = 0;
    let running = false;

    function setActive(index) {
      slots.forEach((slot) => slot.classList.remove("active"));
      const target = trackOrder[index];
      marker.style.transform = `translate(${target.x}px, ${target.y}px)`;
      const activeSlot = slots.find((slot) => Number(slot.dataset.track) === target.slot);
      if (activeSlot) {
        activeSlot.classList.add("active");
      }
      activeIndex = index;
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function roll() {
      if (running) return;
      running = true;
      diceLaunch.classList.add("rolling");

      const targetIndex = 8;
      const totalSteps = trackOrder.length * 2 + targetIndex;

      for (let step = 1; step <= totalSteps; step += 1) {
        const nextIndex = step % trackOrder.length;
        setActive(nextIndex);
        diceImg.src = diceFaces[step % diceFaces.length];
        const t = step / totalSteps;
        await wait(55 + Math.round(Math.pow(t, 2.3) * 110));
      }

      diceImg.src = diceFaces[0];
      diceLaunch.classList.remove("rolling");
      running = false;
    }

    setActive(0);
    diceLaunch.addEventListener("click", roll);
  </script>
</body>
</html>
