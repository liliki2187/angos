<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蛋仔大富翁活动（竖屏）</title>
  <style>
    :root {
      --bg: #fbfbfb;
      --text: #2f2f2f;
      --muted: #676767;
      --button: #ff5956;
      --button-shadow: rgba(255, 97, 92, 0.28);
      --tile-yellow: #fff07d;
      --tile-blue: #8bd0f4;
      --tile-orange: #ffd273;
      --tile-orange-border: #ffa61a;
      --start-bg: #e6e6e6;
      --start-green: #48b44a;
      --active-ring: #ffffff;
      --active-glow: rgba(255, 197, 80, 0.95);
      --trail-glow: rgba(255, 197, 80, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 228, 153, 0.18), transparent 26%),
        linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%);
      color: var(--text);
      font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 30px 16px 48px;
    }

    .screen {
      width: min(100%, 343px);
      min-height: 720px;
      position: relative;
      overflow: hidden;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 244, 176, 0.14), transparent 28%),
        radial-gradient(circle at 50% 76%, rgba(255, 130, 124, 0.08), transparent 24%);
      pointer-events: none;
    }

    .header {
      position: relative;
      text-align: center;
      margin-top: 20px;
      z-index: 1;
    }

    .title {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--muted);
      font-weight: 600;
    }

    .board-wrap {
      position: relative;
      width: 296px;
      margin: 126px auto 0;
      z-index: 1;
    }

    .board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, 56px);
      grid-template-rows: repeat(5, 56px);
      gap: 4px;
      width: 296px;
      height: 296px;
      isolation: isolate;
    }

    .board::before {
      content: "";
      position: absolute;
      inset: -14px;
      border-radius: 36px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 206, 91, 0.16), transparent 62%),
        conic-gradient(from 0deg, rgba(255, 214, 94, 0) 0deg, rgba(255, 214, 94, 0.9) 36deg, rgba(255, 214, 94, 0) 78deg, rgba(255, 214, 94, 0) 360deg);
      opacity: 0;
      filter: blur(18px);
      transform: rotate(0deg);
      transition: opacity 220ms ease;
      z-index: -2;
      pointer-events: none;
    }

    .board::after {
      content: "";
      position: absolute;
      inset: -10px;
      background: linear-gradient(115deg, transparent 18%, rgba(255, 255, 255, 0.84) 34%, transparent 50%);
      opacity: 0;
      transform: translateX(-160%);
      z-index: 3;
      pointer-events: none;
      mix-blend-mode: screen;
      filter: blur(5px);
    }

    .board.rolling::before {
      opacity: 1;
      animation: haloSpin 1s linear infinite;
    }

    .board.rolling::after {
      opacity: 0.9;
      animation: sweepAcross 680ms ease-in-out infinite;
    }

    .center-hole {
      grid-area: 2 / 2 / span 3 / span 3;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 244, 188, 0.28), rgba(255, 244, 188, 0.08) 38%, rgba(255, 255, 255, 0.02) 70%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0));
      position: relative;
    }

    .center-hole::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 22px;
      border: 1px dashed rgba(255, 209, 102, 0.32);
      opacity: 0.35;
    }

    .track-tile,
    .start-tile {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      user-select: none;
      overflow: hidden;
      transform-origin: center;
      transition:
        transform 160ms ease,
        box-shadow 180ms ease,
        filter 180ms ease,
        border-color 180ms ease;
    }

    .track-tile::before,
    .track-tile::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
    }

    .track-tile::before {
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.72), transparent 62%);
      transform: scale(0.72);
      transition: opacity 140ms ease, transform 180ms ease;
    }

    .track-tile::after {
      background: linear-gradient(115deg, transparent 18%, rgba(255, 255, 255, 0.92) 42%, transparent 60%);
      transform: translateX(-140%);
    }

    .track-tile .label {
      position: relative;
      z-index: 1;
      transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease;
      white-space: nowrap;
    }

    .track-tile.currency {
      background: var(--tile-yellow);
    }

    .track-tile.item {
      background: var(--tile-blue);
    }

    .track-tile.deluxe {
      background: var(--tile-orange);
      border: 3px solid var(--tile-orange-border);
    }

    .track-tile.active {
      transform: translateY(-2px) scale(1.03);
      z-index: 2;
      box-shadow:
        0 0 0 2px var(--active-ring) inset,
        0 0 0 5px rgba(255, 184, 48, 0.9) inset,
        0 0 18px rgba(255, 176, 60, 0.86),
        0 0 30px rgba(255, 138, 66, 0.42);
      filter: saturate(1.06) brightness(1.02);
    }

    .track-tile.active::before {
      opacity: 1;
      transform: scale(1);
    }

    .track-tile.active::after {
      opacity: 0.92;
      animation: tileShine 420ms ease-out forwards;
    }

    .track-tile.active .label {
      animation: reelSnap 130ms linear 4;
    }

    .track-tile.trail-1,
    .track-tile.trail-2,
    .track-tile.trail-3 {
      z-index: 1;
    }

    .track-tile.trail-1 {
      box-shadow: 0 0 12px var(--trail-glow);
    }

    .track-tile.trail-2 {
      box-shadow: 0 0 8px rgba(255, 197, 80, 0.26);
    }

    .track-tile.trail-3 {
      box-shadow: 0 0 4px rgba(255, 197, 80, 0.2);
    }

    .board.rolling .track-tile .label {
      animation: reelBlur 150ms linear infinite;
    }

    .board.jackpot .track-tile.winner {
      animation: winnerPulse 860ms ease-in-out infinite;
    }

    .start-tile {
      background: var(--start-bg);
    }

    .start-square {
      width: 28px;
      height: 28px;
      background: var(--start-green);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45), 0 0 0 1px rgba(40, 130, 42, 0.18);
    }

    .controls {
      position: relative;
      z-index: 1;
      margin-top: 74px;
      text-align: center;
    }

    .roll-button {
      min-width: 172px;
      border: 0;
      border-radius: 999px;
      padding: 17px 28px;
      background: var(--button);
      color: #fff4ef;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 12px 24px var(--button-shadow);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .roll-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(255, 97, 92, 0.34);
    }

    .roll-button:disabled {
      cursor: default;
      opacity: 0.9;
    }

    .roll-button.spinning {
      animation: buttonBreath 860ms ease-in-out infinite;
    }

    .dice-left {
      margin: 14px 0 0;
      font-size: 14px;
      font-weight: 600;
      color: #484848;
    }

    .result {
      min-height: 24px;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #ff7d22;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .result.show {
      opacity: 1;
      transform: translateY(0);
    }

    .spark-field {
      position: absolute;
      inset: -20px;
      pointer-events: none;
      overflow: hidden;
      z-index: 4;
    }

    .spark {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.96) 0%, rgba(255, 224, 132, 0.92) 34%, rgba(255, 156, 82, 0.18) 72%, transparent 100%);
      filter: blur(0.4px);
      opacity: 0;
      animation: sparkFly 820ms ease-out forwards;
    }

    @keyframes haloSpin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes sweepAcross {
      0% {
        transform: translateX(-155%) skewX(-18deg);
      }
      100% {
        transform: translateX(170%) skewX(-18deg);
      }
    }

    @keyframes reelBlur {
      0% {
        transform: translateY(-1px);
        filter: blur(0.1px);
        opacity: 0.95;
      }
      50% {
        transform: translateY(1px);
        filter: blur(0.6px);
        opacity: 0.72;
      }
      100% {
        transform: translateY(-1px);
        filter: blur(0.1px);
        opacity: 0.95;
      }
    }

    @keyframes reelSnap {
      0% {
        transform: translateY(-6px);
        filter: blur(1.6px);
      }
      50% {
        transform: translateY(5px);
        filter: blur(0.9px);
      }
      100% {
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes tileShine {
      0% {
        opacity: 0;
        transform: translateX(-140%);
      }
      20% {
        opacity: 0.92;
      }
      100% {
        opacity: 0;
        transform: translateX(140%);
      }
    }

    @keyframes buttonBreath {
      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 12px 24px rgba(255, 97, 92, 0.28);
      }
      50% {
        transform: scale(1.03);
        box-shadow: 0 16px 30px rgba(255, 97, 92, 0.42);
      }
    }

    @keyframes winnerPulse {
      0%,
      100% {
        transform: translateY(-2px) scale(1.03);
        box-shadow:
          0 0 0 2px var(--active-ring) inset,
          0 0 0 5px rgba(255, 184, 48, 0.9) inset,
          0 0 18px rgba(255, 176, 60, 0.88),
          0 0 30px rgba(255, 138, 66, 0.45);
      }
      50% {
        transform: translateY(-2px) scale(1.07);
        box-shadow:
          0 0 0 2px var(--active-ring) inset,
          0 0 0 6px rgba(255, 196, 98, 0.96) inset,
          0 0 26px rgba(255, 189, 74, 0.98),
          0 0 42px rgba(255, 140, 70, 0.56);
      }
    }

    @keyframes sparkFly {
      0% {
        transform: translate(0, 0) scale(0.4);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(1.24);
        opacity: 0;
      }
    }

    @media (max-width: 360px) {
      body {
        padding-left: 8px;
        padding-right: 8px;
      }

      .screen {
        width: 100%;
      }

      .title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="header">
      <h1 class="title">蛋仔大富翁活动（竖屏）</h1>
      <p class="subtitle">活动时间： 2026.04.01 - 2026.04.15</p>
    </header>

    <section class="board-wrap">
      <div class="spark-field" id="sparkField"></div>
      <div class="board" id="board" aria-label="活动奖池">
        <div class="track-tile deluxe" data-index="12" style="grid-area:1 / 1;"><span class="label">豪华奖</span></div>
        <div class="track-tile currency" data-index="11" style="grid-area:1 / 2;"><span class="label">货币</span></div>
        <div class="track-tile item" data-index="10" style="grid-area:1 / 3;"><span class="label">道具</span></div>
        <div class="track-tile item" data-index="9" style="grid-area:1 / 4;"><span class="label">道具</span></div>
        <div class="track-tile currency" data-index="8" style="grid-area:1 / 5;"><span class="label">货币</span></div>

        <div class="track-tile currency" data-index="13" style="grid-area:2 / 1;"><span class="label">货币</span></div>
        <div class="track-tile deluxe" data-index="7" style="grid-area:2 / 5;"><span class="label">豪华奖</span></div>

        <div class="track-tile item" data-index="14" style="grid-area:3 / 1;"><span class="label">道具</span></div>
        <div class="track-tile item" data-index="6" style="grid-area:3 / 5;"><span class="label">道具</span></div>

        <div class="track-tile currency" data-index="15" style="grid-area:4 / 1;"><span class="label">货币</span></div>
        <div class="track-tile currency" data-index="5" style="grid-area:4 / 5;"><span class="label">货币</span></div>

        <div class="start-tile" style="grid-area:5 / 1;">
          <div class="start-square" aria-label="起点"></div>
        </div>
        <div class="track-tile currency" data-index="1" style="grid-area:5 / 2;"><span class="label">货币</span></div>
        <div class="track-tile item" data-index="2" style="grid-area:5 / 3;"><span class="label">道具</span></div>
        <div class="track-tile item" data-index="3" style="grid-area:5 / 4;"><span class="label">道具</span></div>
        <div class="track-tile deluxe" data-index="4" style="grid-area:5 / 5;"><span class="label">豪华奖</span></div>

        <div class="center-hole" aria-hidden="true"></div>
      </div>
    </section>

    <section class="controls">
      <button class="roll-button" id="rollButton" type="button">掷骰子（消耗×1）</button>
      <p class="result" id="resultText"></p>
      <p class="dice-left" id="diceLeft">剩余骰子：15</p>
    </section>
  </main>

  <script>
    const board = document.getElementById("board");
    const rollButton = document.getElementById("rollButton");
    const diceLeft = document.getElementById("diceLeft");
    const resultText = document.getElementById("resultText");
    const sparkField = document.getElementById("sparkField");
    const trackTiles = [...document.querySelectorAll(".track-tile")]
      .sort((a, b) => Number(a.dataset.index) - Number(b.dataset.index));

    const params = new URLSearchParams(window.location.search);
    const autoplay = params.get("autoplay") === "1";
    const forcedTarget = Number(params.get("target")) || null;
    const forcedLoops = Number(params.get("loops")) || null;

    let remainingDice = Number(params.get("dice")) || 15;
    let activeIndex = 0;
    let rolling = false;

    function updateDice() {
      diceLeft.textContent = "剩余骰子：" + remainingDice;
    }

    function clearTrackState() {
      trackTiles.forEach((tile) => {
        tile.classList.remove("active", "trail-1", "trail-2", "trail-3", "winner");
      });
    }

    function paintTrack(index) {
      clearTrackState();
      const length = trackTiles.length;

      for (let offset = 0; offset < 4; offset += 1) {
        const tile = trackTiles[(index - offset + length) % length];
        if (!tile) {
          continue;
        }

        if (offset === 0) {
          tile.classList.add("active");
          continue;
        }

        tile.classList.add("trail-" + offset);
      }

      activeIndex = index;
    }

    function showResult(text) {
      resultText.textContent = text;
      resultText.classList.add("show");
    }

    function hideResult() {
      resultText.classList.remove("show");
    }

    function wait(ms) {
      return new Promise((resolve) => {
        window.setTimeout(resolve, ms);
      });
    }

    function createSparkBurst() {
      sparkField.innerHTML = "";
      const count = 10;

      for (let i = 0; i < count; i += 1) {
        const spark = document.createElement("span");
        spark.className = "spark";
        const angle = (-110 + i * 22) * (Math.PI / 180);
        const radius = 22 + Math.random() * 42;
        const dx = Math.cos(angle) * radius;
        const dy = Math.sin(angle) * radius;
        spark.style.left = 150 + Math.random() * 16 + "px";
        spark.style.top = 146 + Math.random() * 10 + "px";
        spark.style.setProperty("--dx", dx.toFixed(1) + "px");
        spark.style.setProperty("--dy", dy.toFixed(1) + "px");
        spark.style.animationDelay = (i * 26) + "ms";
        sparkField.appendChild(spark);
      }

      window.setTimeout(() => {
        sparkField.innerHTML = "";
      }, 950);
    }

    function pickTargetIndex() {
      if (forcedTarget && forcedTarget >= 1 && forcedTarget <= trackTiles.length) {
        return forcedTarget;
      }

      return Math.floor(Math.random() * trackTiles.length) + 1;
    }

    async function spinWheel() {
      if (rolling || remainingDice <= 0) {
        return;
      }

      rolling = true;
      remainingDice -= 1;
      updateDice();
      hideResult();
      rollButton.disabled = true;
      rollButton.classList.add("spinning");
      board.classList.remove("jackpot");
      clearTrackState();
      board.classList.add("rolling");

      const targetIndex = pickTargetIndex();
      const loops = forcedLoops || 4;
      const totalSteps = loops * trackTiles.length + targetIndex;

      for (let step = 1; step <= totalSteps; step += 1) {
        const progress = step / totalSteps;
        const eased = Math.pow(progress, 2.18);
        const delay = 52 + Math.round(eased * 212);
        paintTrack(step % trackTiles.length === 0 ? trackTiles.length - 1 : (step % trackTiles.length) - 1);
        await wait(delay);
      }

      board.classList.remove("rolling");
      const winner = trackTiles[targetIndex - 1];
      clearTrackState();
      winner.classList.add("active", "winner");
      board.classList.add("jackpot");
      createSparkBurst();
      showResult("本次获得：" + winner.textContent.trim());

      await wait(1150);

      rollButton.disabled = remainingDice <= 0;
      rollButton.classList.remove("spinning");
      rolling = false;
    }

    clearTrackState();
    updateDice();

    rollButton.addEventListener("click", spinWheel);

    if (autoplay) {
      window.setTimeout(() => {
        spinWheel();
      }, 480);
    }
  </script>
</body>
</html>
