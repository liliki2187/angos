<!--
PROTOTYPE - NOT FOR PRODUCTION
Question: 骰子判定选择阶段中，能否用唯一骰面工作台、计入即保留、重投未计入骰面和提交前结果预览，解决入口冗余与重投缺失问题？
Date: 2026-05-22
Scope: 局部实验页；不套用完整全链，不实现一键推荐、黑骰扩展或投骰动效。
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>骰面判定</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b12;
      --panel: rgba(10, 16, 29, 0.94);
      --panel-2: rgba(18, 27, 44, 0.78);
      --panel-3: rgba(8, 13, 24, 0.74);
      --line: rgba(148, 163, 184, 0.26);
      --line-strong: rgba(212, 168, 83, 0.54);
      --gold: #d4a853;
      --gold-soft: #fde68a;
      --text: #e5edf6;
      --muted: #91a1b8;
      --blue: #60a5fa;
      --green: #34d399;
      --red: #fb7185;
      --amber: #f59e0b;
      --cyan: #22d3ee;
      --violet: #a78bfa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 16%, rgba(96, 165, 250, 0.14), transparent 30%),
        radial-gradient(circle at 82% 10%, rgba(212, 168, 83, 0.10), transparent 24%),
        linear-gradient(180deg, #0a1220, #05070d 72%);
      font-family: "Microsoft YaHei", "Noto Sans SC", "PingFang SC", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    a {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 28px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    }

    h1 {
      margin: 0;
      color: var(--gold-soft);
      font-size: 17px;
      line-height: 1.2;
    }

    .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .link-button {
      min-height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.34);
      background: rgba(23, 32, 51, 0.92);
      color: #dbeafe;
      cursor: pointer;
      padding: 7px 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      gap: 6px;
    }

    .link-button:hover {
      border-color: rgba(212, 168, 83, 0.72);
      color: #fff7d6;
    }

    .judge-modal {
      border: 1px solid rgba(212, 168, 83, 0.48);
      border-radius: 12px;
      background:
        radial-gradient(circle at 28% 6%, rgba(96, 165, 250, 0.11), transparent 26%),
        linear-gradient(180deg, rgba(9, 17, 31, 0.96), rgba(3, 7, 14, 0.94));
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    .judge-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 14px;
      align-items: center;
      padding: 16px 18px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }

    .judge-title {
      min-width: 0;
    }

    .judge-title strong {
      display: block;
      color: var(--gold-soft);
      font-size: 20px;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .judge-title span {
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.4;
    }

    .close-button {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(30, 41, 59, 0.76);
      color: #cbd5e1;
      cursor: pointer;
      font-weight: 900;
    }

    .close-button:hover {
      border-color: rgba(248, 113, 113, 0.62);
      color: #fecaca;
    }

    .party-toggle {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 8px;
      background: rgba(8, 13, 24, 0.82);
      overflow: hidden;
    }

    .party-toggle button {
      min-width: 82px;
      min-height: 34px;
      padding: 0 10px;
      background: transparent;
      color: #cbd5e1;
      cursor: pointer;
      font-weight: 850;
    }

    .party-toggle button + button {
      border-left: 1px solid rgba(148, 163, 184, 0.2);
    }

    .party-toggle button.is-active {
      background: rgba(113, 63, 18, 0.58);
      color: #fff7d6;
    }

    .modal-body {
      display: grid;
      grid-template-columns: minmax(0, 1.38fr) 360px;
      gap: 12px;
      padding: 14px;
    }

    .left-flow,
    .right-flow {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-2);
      padding: 12px;
      min-width: 0;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-title {
      color: var(--gold);
      font-size: 14px;
      font-weight: 900;
    }

    .section-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align: right;
    }

    .section-note:empty,
    .result-detail:empty,
    .control-hint:empty {
      display: none;
    }

    .section-title-group {
      display: grid;
      gap: 3px;
    }

    .section-caption {
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.35;
    }

    .face-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .face-card {
      min-height: 202px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(20, 31, 50, 0.96), rgba(9, 14, 25, 0.96));
      color: var(--text);
      cursor: pointer;
      padding: 12px;
      text-align: left;
      display: grid;
      gap: 10px;
      align-content: start;
      position: relative;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .face-card:hover {
      border-color: rgba(212, 168, 83, 0.62);
      background:
        linear-gradient(180deg, rgba(29, 42, 66, 0.98), rgba(11, 17, 29, 0.98));
    }

    .face-card.is-selected {
      border-color: rgba(212, 168, 83, 0.9);
      box-shadow: 0 0 0 1px rgba(212, 168, 83, 0.22), 0 14px 34px rgba(0, 0, 0, 0.28);
      background:
        radial-gradient(circle at 84% 14%, rgba(212, 168, 83, 0.22), transparent 28%),
        linear-gradient(180deg, rgba(37, 31, 17, 0.98), rgba(14, 18, 28, 0.98));
    }

    .face-card.will-reroll {
      border-color: rgba(96, 165, 250, 0.46);
      box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.12);
    }

    .face-card[disabled] {
      cursor: default;
      opacity: 0.62;
      border-style: dashed;
      background: rgba(8, 13, 24, 0.72);
    }

    .face-card[disabled]:hover {
      border-color: rgba(148, 163, 184, 0.28);
      background: rgba(8, 13, 24, 0.72);
    }

    .face-card.is-inactive {
      cursor: default;
      border-style: dashed;
      border-color: rgba(148, 163, 184, 0.18);
      background: rgba(8, 13, 24, 0.36);
      color: #64748b;
      box-shadow: none;
    }

    .face-card.is-inactive:hover {
      border-color: rgba(148, 163, 184, 0.18);
      background: rgba(8, 13, 24, 0.36);
    }

    .face-top {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .portrait {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.86);
      color: #dbeafe;
      font-size: 19px;
      font-weight: 900;
    }

    .face-status {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: start;
      max-width: 100%;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(96, 165, 250, 0.32);
      background: rgba(30, 64, 175, 0.18);
      color: #bfdbfe;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .face-status.is-kept {
      border-color: rgba(212, 168, 83, 0.58);
      background: rgba(113, 63, 18, 0.32);
      color: #fff7d6;
    }

    .face-owner {
      color: #f8e8bd;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .face-meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .face-die {
      height: 92px;
      border-radius: 10px;
      border: 1px solid rgba(96, 165, 250, 0.28);
      background:
        radial-gradient(circle at 50% 22%, rgba(96, 165, 250, 0.18), transparent 42%),
        rgba(3, 8, 17, 0.68);
      display: grid;
      place-items: center;
      overflow: visible;
    }

    .dice-model {
      width: 108px;
      height: 92px;
      display: block;
      overflow: visible;
    }

    .die-chip-fallback {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .card-action {
      min-height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      display: grid;
      place-items: center;
      color: #cbd5e1;
      background: rgba(2, 6, 23, 0.36);
      font-size: 12px;
      font-weight: 800;
    }

    .face-card.is-selected .card-action {
      border-color: rgba(212, 168, 83, 0.62);
      color: #fff7d6;
      background: rgba(113, 63, 18, 0.34);
    }

    .reroll-range {
      margin-top: 10px;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      border: 1px dashed rgba(96, 165, 250, 0.34);
      border-radius: 9px;
      background: rgba(30, 64, 175, 0.10);
      color: #dbeafe;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    .reroll-range strong {
      color: var(--gold-soft);
      white-space: nowrap;
    }

    .target-summary {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .score-ring {
      width: 104px;
      height: 104px;
      border-radius: 999px;
      border: 8px solid rgba(51, 65, 85, 0.9);
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(2, 6, 23, 0.96), rgba(15, 23, 42, 0.78));
      position: relative;
    }

    .score-ring::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: inherit;
      border: 8px solid rgba(52, 211, 153, var(--ring-alpha, 0));
      clip-path: polygon(0 0, var(--ring-width, 0%) 0, var(--ring-width, 0%) 100%, 0 100%);
    }

    .score-ring.is-success {
      border-color: rgba(52, 211, 153, 0.44);
    }

    .score-number {
      color: #fff7d6;
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      z-index: 1;
    }

    .score-label {
      color: var(--muted);
      font-size: 11px;
      margin-top: 5px;
      text-align: center;
      z-index: 1;
    }

    .target-copy {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .result-line {
      color: #f8e8bd;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.35;
    }

    .result-detail {
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.5;
    }

    .meter-list {
      display: grid;
      gap: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      padding-top: 10px;
    }

    .meter-row {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 78px;
      gap: 8px;
      align-items: center;
      color: #cbd5e1;
      font-size: 12px;
    }

    .meter-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(51, 65, 85, 0.76);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.9), rgba(52, 211, 153, 0.95));
      transition: width 160ms ease;
    }

    .meter-count {
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .meter-count.is-covered {
      color: #bbf7d0;
      font-weight: 800;
    }

    .preview-card {
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 10px;
      background: var(--panel-3);
      padding: 11px;
      display: grid;
      gap: 9px;
    }

    .preview-card.is-success {
      border-color: rgba(52, 211, 153, 0.38);
      background: rgba(6, 78, 59, 0.20);
    }

    .preview-card.is-fail {
      border-color: rgba(248, 113, 113, 0.34);
      background: rgba(127, 29, 29, 0.20);
    }

    .preview-title {
      color: var(--gold-soft);
      font-size: 14px;
      font-weight: 900;
    }

    .preview-list {
      display: grid;
      gap: 6px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.45;
    }

    .control-stack {
      display: grid;
      gap: 10px;
    }

    .reroll-meter {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid rgba(96, 165, 250, 0.28);
      border-radius: 9px;
      background: rgba(15, 23, 42, 0.56);
      padding: 8px 10px;
      color: #cbd5e1;
      font-size: 12px;
    }

    .reroll-meter strong {
      color: var(--gold-soft);
      font-size: 17px;
      white-space: nowrap;
    }

    .reroll-button {
      min-height: 46px;
      border-radius: 9px;
      border: 1px solid rgba(34, 211, 238, 0.72);
      background: linear-gradient(180deg, rgba(8, 145, 178, 0.86), rgba(14, 116, 144, 0.76));
      color: #ecfeff;
      cursor: pointer;
      font-weight: 950;
      box-shadow: 0 12px 30px rgba(8, 145, 178, 0.22);
    }

    .reroll-button:hover {
      border-color: rgba(103, 232, 249, 0.94);
      background: linear-gradient(180deg, rgba(8, 145, 178, 0.98), rgba(21, 94, 117, 0.92));
    }

    .reroll-button.is-secondary {
      border-color: rgba(148, 163, 184, 0.34);
      background: rgba(15, 23, 42, 0.72);
      color: #dbeafe;
      box-shadow: none;
    }

    .reroll-button:disabled {
      cursor: default;
      border-color: rgba(148, 163, 184, 0.20);
      background: rgba(51, 65, 85, 0.50);
      color: #94a3b8;
      box-shadow: none;
    }

    .control-hint {
      color: #a8bed8;
      font-size: 12px;
      line-height: 1.45;
    }

    .submit-button {
      width: 100%;
      min-width: 0;
      min-height: 42px;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid rgba(212, 168, 83, 0.72);
      background: linear-gradient(180deg, rgba(91, 69, 28, 0.96), rgba(42, 35, 18, 0.96));
      color: var(--gold-soft);
      cursor: pointer;
      font-weight: 900;
    }

    .submit-button:disabled {
      cursor: default;
      border-color: rgba(148, 163, 184, 0.20);
      background: rgba(51, 65, 85, 0.54);
      color: #94a3b8;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      min-height: 38px;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid rgba(212, 168, 83, 0.48);
      background: rgba(10, 16, 29, 0.96);
      color: #f8e8bd;
      font-size: 13px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.36);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 20;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @media (max-width: 980px) {
      .modal-body { grid-template-columns: 1fr; }
      .right-flow { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .topbar,
      .judge-head,
      .target-summary {
        grid-template-columns: 1fr;
      }

      .face-grid,
      .right-flow {
        grid-template-columns: 1fr;
      }

      .party-toggle,
      .close-button,
      .submit-button {
        width: 100%;
      }

      .party-toggle button {
        flex: 1;
      }

      .section-note {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div>
        <h1>骰面判定</h1>
      </div>
      <a class="link-button" href="../../../../index.html">返回入口</a>
    </div>

    <section class="judge-modal" aria-label="骰子判定">
      <header class="judge-head">
        <div class="judge-title">
          <strong>罗斯威尔档案残页</strong>
          <span id="partyMeta">线索任务 · 消耗 1 行动点</span>
        </div>
        <div class="party-toggle" id="partyToggle" aria-label="参判人数演示">
          <button type="button" data-party-size="3" class="is-active">3人判定</button>
          <button type="button" data-party-size="5">5人判定</button>
        </div>
        <button class="close-button" type="button" aria-label="关闭判定弹窗">X</button>
      </header>

      <div class="modal-body">
        <div class="left-flow">
          <section class="section" aria-labelledby="faceTitle">
            <div class="section-head">
              <div class="section-title-group">
                <div class="section-title" id="faceTitle">本轮骰面</div>
                <div class="section-caption" id="selectedCount">计入 0/3</div>
              </div>
              <div class="section-note" id="workbenchNote"></div>
            </div>
            <div class="face-grid" id="faceGrid" aria-label="唯一骰面工作台"></div>
            <div class="reroll-range" id="rerollRange">
              <span>将重投：无</span>
            </div>
          </section>
        </div>

        <aside class="right-flow" aria-label="判定目标与提交预览">
          <section class="section" aria-labelledby="targetTitle">
            <div class="section-head">
              <div class="section-title" id="targetTitle">判定摘要</div>
              <div class="section-note"></div>
            </div>
            <div class="target-summary">
              <div class="score-ring" id="scoreRing" style="--ring-alpha: 0; --ring-width: 0%;">
                <div>
                  <div class="score-number" id="scoreNumber">0/3</div>
                  <div class="score-label">有效点</div>
                </div>
              </div>
              <div class="target-copy">
                <div class="result-line" id="resultLine">尚未选择骰面</div>
                <div class="result-detail" id="resultDetail"></div>
              </div>
            </div>

            <div class="meter-list" aria-label="属性贡献拆解">
              <div class="meter-row">
                <div>探索</div>
                <div class="meter-track"><div class="meter-fill" id="exploreFill"></div></div>
                <div class="meter-count" id="exploreCount">0 / 2</div>
              </div>
              <div class="meter-row">
                <div>洞察</div>
                <div class="meter-track"><div class="meter-fill" id="insightFill"></div></div>
                <div class="meter-count" id="insightCount">0 / 1</div>
              </div>
            </div>
          </section>

          <section class="section" aria-labelledby="previewTitle">
            <div class="section-head">
              <div class="section-title" id="previewTitle">提交后果</div>
              <div class="section-note" id="previewMeta"></div>
            </div>
            <div class="preview-card is-fail" id="previewCard">
              <div class="preview-title" id="previewCardTitle">尚未选择</div>
              <div class="preview-list" id="previewList">
                <div>计入骰面后可提交判定。</div>
              </div>
            </div>
          </section>

          <section class="section" aria-labelledby="controlTitle">
            <div class="section-head">
              <div class="section-title" id="controlTitle">操作</div>
              <div class="section-note"></div>
            </div>
            <div class="control-stack">
              <div class="reroll-meter">
                <span>重投次数</span>
                <strong id="rerollCount">2 / 2</strong>
              </div>
              <button class="reroll-button" id="rerollButton" type="button">重投未计入骰面</button>
              <button class="submit-button" id="submitButton" type="button" disabled>请选择骰面</button>

    function currentFace(participant) {
      return participant.faces[participant.faceIndex] || participant.faces[0];
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function faceModelType(face) {
      if (!face || face.attrClass === "attr-empty") return "blank";
      if (face.attrClass === "attr-insight") return "insight";
      if (face.attrClass === "attr-explore") return "explore";
      return "blank";
    }

    const DICE_MODEL_PALETTE = {
      explore: { top: "#10b981", front: "#087545", side: "#0b5f3c", c: "#bbf7d0" },
      insight: { top: "#06b6d4", front: "#075985", side: "#0e7490", c: "#cffafe" },
      blank: { top: "#7c8798", front: "#3d4654", side: "#566172", c: "#e2e8f0" },
    };
    const DICE_MODEL_PROFILE = { duration: 0.82, turns: 4.2 };
    const diceModelRegistry = new Map();
    let diceModelRaf = 0;

    function diceModelHash(text) {
      return String(text || "").split("").reduce((acc, ch) => ((acc << 5) - acc + ch.charCodeAt(0)) | 0, 0);
    }

    function diceModelMakeDie(id, label, type, index) {
      const seed = diceModelHash(`${id}-${label}-${index}`);
      const rand = (offset) => {
        const x = Math.sin(seed * 0.001 + offset) * 10000;
        return x - Math.floor(x);
      };
      return {
        id,
        label,
        type,
        delay: index * 0.04,
        phase: rand(2) * Math.PI * 2,
        spinBoost: 0.88 + rand(5) * 0.24,
        settle: [Math.PI * 0.5, (rand(11) - 0.5) * 0.04, Math.PI * 0.5 + (rand(17) - 0.5) * 0.08],
        stopAt: null,
        stopBase: 0,
        target: [54, 38, 0],
      };
    }

    function diceModelNormalize(v) {
      const len = Math.hypot(v[0], v[1], v[2]) || 1;
      return [v[0] / len, v[1] / len, v[2] / len];
    }

    function diceModelSub(a, b) {
      return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
    }

    function diceModelCross(a, b) {
      return [
        a[1] * b[2] - a[2] * b[1],
        a[2] * b[0] - a[0] * b[2],
        a[0] * b[1] - a[1] * b[0],
      ];
    }

    function diceModelFaceNormal(points) {
      return diceModelNormalize(diceModelCross(diceModelSub(points[1], points[0]), diceModelSub(points[2], points[1])));
    }

    function diceModelColorMix(hex, amount) {
      const n = parseInt(hex.slice(1), 16);
      const r = Math.min(255, Math.floor(((n >> 16) & 255) * amount));
      const g = Math.min(255, Math.floor(((n >> 8) & 255) * amount));
      const b = Math.min(255, Math.floor((n & 255) * amount));
      return `rgb(${r},${g},${b})`;
    }

    function diceModelFaceBrightness(normal) {
      const light = diceModelNormalize([0.42, 0.88, 0.54]);
      const dot = Math.max(0, normal[0] * light[0] + normal[1] * light[1] + normal[2] * light[2]);
      return 0.34 + dot * 0.66;
    }

    function diceModelSolidFaceColor(hex, normal) {
      return diceModelColorMix(hex, 0.86 + diceModelFaceBrightness(normal) * 0.18);
    }

    function diceModelSignedArea(points) {
      let area = 0;
      for (let i = 0; i < points.length; i += 1) {
        const next = points[(i + 1) % points.length];
        area += points[i][0] * next[1] - next[0] * points[i][1];
      }
      return area / 2;
    }

    function diceModelArea(points) {
      return Math.abs(diceModelSignedArea(points));
    }

    function diceModelProject(p, origin, scale) {
      const camera = 4.7;
      const depth = camera - p[2] * 0.38;
      const perspective = camera / depth;
      return [
        origin[0] + p[0] * scale * perspective,
        origin[1] - p[1] * scale * perspective + p[2] * scale * 0.18,
        p[2],
      ];
    }

    function diceModelRotate(p, rx, ry, rz) {
      let [x, y, z] = p;
      let c = Math.cos(rx), s = Math.sin(rx);
      let y1 = y * c - z * s;
      let z1 = y * s + z * c;
      y = y1; z = z1;
      c = Math.cos(ry); s = Math.sin(ry);
      let x1 = x * c + z * s;
      z1 = -x * s + z * c;
      x = x1; z = z1;
      c = Math.cos(rz); s = Math.sin(rz);
      x1 = x * c - y * s;
      y1 = x * s + y * c;
      return [x1, y1, z];
    }

    function diceModelDrawFace(ctx, points, fill) {
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 1; i < points.length; i += 1) ctx.lineTo(points[i][0], points[i][1]);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
    }

    function diceModelMakeFaceTexture(fill, color, text) {
      const size = 192;
      const tex = document.createElement("canvas");
      tex.width = size;
      tex.height = size;
      const t = tex.getContext("2d");
      t.fillStyle = fill;
      t.fillRect(0, 0, size, size);
      const glow = t.createLinearGradient(0, 0, size, size);
      glow.addColorStop(0, "rgba(255,255,255,0.2)");
      glow.addColorStop(0.38, "rgba(255,255,255,0.04)");
      glow.addColorStop(1, "rgba(0,0,0,0.2)");
      t.fillStyle = glow;
      t.fillRect(0, 0, size, size);
      const topGloss = t.createRadialGradient(size * 0.28, size * 0.18, 0, size * 0.3, size * 0.2, size * 0.72);
      topGloss.addColorStop(0, "rgba(255,255,255,0.18)");
      topGloss.addColorStop(0.42, "rgba(255,255,255,0.05)");
      topGloss.addColorStop(1, "rgba(255,255,255,0)");
      t.fillStyle = topGloss;
      t.fillRect(0, 0, size, size);
      const lowerShade = t.createLinearGradient(0, size * 0.52, 0, size);
      lowerShade.addColorStop(0, "rgba(0,0,0,0)");
      lowerShade.addColorStop(1, "rgba(0,0,0,0.24)");
      t.fillStyle = lowerShade;
      t.fillRect(0, 0, size, size);
      t.lineJoin = "round";
      t.strokeStyle = "rgba(255,255,255,0.08)";
      t.lineWidth = 8;
      t.strokeRect(8, 8, size - 16, size - 16);
      t.strokeStyle = "rgba(2,6,23,0.22)";
      t.lineWidth = 10;
      t.strokeRect(5, 5, size - 10, size - 10);
      if (text) {
        const lines = text.length > 3 ? [text.slice(0, 2), text.slice(2)] : [text];
        const fontSize = text.length <= 1 ? 74 : text.length <= 3 ? 56 : 42;
        const lineHeight = fontSize * 1.06;
        t.textAlign = "center";
        t.textBaseline = "middle";
        t.font = `900 ${fontSize}px Microsoft YaHei, sans-serif`;
        t.lineJoin = "round";
        t.lineWidth = Math.max(8, fontSize * 0.18);
        t.strokeStyle = "rgba(2, 6, 23, 0.92)";
        t.fillStyle = color;
        t.shadowColor = "rgba(0,0,0,0.48)";
        t.shadowBlur = 5;
        lines.forEach((line, lineIndex) => {
          const y = size * 0.52 + (lineIndex - (lines.length - 1) / 2) * lineHeight;
          t.strokeText(line, size * 0.5, y);
          t.fillText(line, size * 0.5, y);
        });
      }
      return tex;
    }

    function diceModelMapTriangle(ctx, image, src, dst) {
      const den = src[0][0] * (src[1][1] - src[2][1]) +
        src[1][0] * (src[2][1] - src[0][1]) +
        src[2][0] * (src[0][1] - src[1][1]);
      if (Math.abs(den) < 0.001) return;
      const a = (dst[0][0] * (src[1][1] - src[2][1]) +
        dst[1][0] * (src[2][1] - src[0][1]) +
        dst[2][0] * (src[0][1] - src[1][1])) / den;
      const b = (dst[0][1] * (src[1][1] - src[2][1]) +
        dst[1][1] * (src[2][1] - src[0][1]) +
        dst[2][1] * (src[0][1] - src[1][1])) / den;
      const c = (dst[0][0] * (src[2][0] - src[1][0]) +
        dst[1][0] * (src[0][0] - src[2][0]) +
        dst[2][0] * (src[1][0] - src[0][0])) / den;
      const d = (dst[0][1] * (src[2][0] - src[1][0]) +
        dst[1][1] * (src[0][0] - src[2][0]) +
        dst[2][1] * (src[1][0] - src[0][0])) / den;
      const e = (dst[0][0] * (src[1][0] * src[2][1] - src[2][0] * src[1][1]) +
        dst[1][0] * (src[2][0] * src[0][1] - src[0][0] * src[2][1]) +
        dst[2][0] * (src[0][0] * src[1][1] - src[1][0] * src[0][1])) / den;
      const f = (dst[0][1] * (src[1][0] * src[2][1] - src[2][0] * src[1][1]) +
        dst[1][1] * (src[2][0] * src[0][1] - src[0][0] * src[2][1]) +
        dst[2][1] * (src[0][0] * src[1][1] - src[1][0] * src[0][1])) / den;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(dst[0][0], dst[0][1]);
      ctx.lineTo(dst[1][0], dst[1][1]);
      ctx.lineTo(dst[2][0], dst[2][1]);
      ctx.closePath();
      ctx.clip();
      ctx.transform(a, b, c, d, e, f);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(image, 0, 0);
      ctx.restore();
    }

    function diceModelDrawTexturedQuad(ctx, points, texture) {
      const size = texture.width;
      const src = [[0, size], [size, size], [size, 0], [0, 0]];
      diceModelMapTriangle(ctx, texture, [src[0], src[1], src[2]], [points[0], points[1], points[2]]);
      diceModelMapTriangle(ctx, texture, [src[0], src[2], src[3]], [points[0], points[2], points[3]]);
    }

    function diceModelMotion(die, elapsed, now) {
      const local = Math.max(0, elapsed - die.delay);
      let spinLeft = 1;
      let phase = (local / DICE_MODEL_PROFILE.duration) * DICE_MODEL_PROFILE.turns * Math.PI * 2 * die.spinBoost;
      if (die.stopAt) {
        const stopLocal = Math.max(0, (now - die.stopAt) / 1000);
        const t = Math.min(stopLocal / 0.34, 1);
        spinLeft = Math.pow(1 - t, 2.15);
        phase = die.stopBase + (1 - spinLeft) * Math.PI * 0.8;
      }
      const rot = [
        die.settle[0] + phase * spinLeft,
        die.settle[1] + Math.sin(phase + die.phase) * 0.1 * spinLeft,
        die.settle[2] + Math.cos(phase * 0.8 + die.phase) * 0.09 * spinLeft,
      ];
      const lift = Math.sin(Math.min(local / DICE_MODEL_PROFILE.duration, 1) * Math.PI) * 0.08 * spinLeft;
      return { spinLeft, rot, lift, t: Math.min(local / DICE_MODEL_PROFILE.duration, 1) };
    }

    function diceModelDrawSpinCue(ctx, x, z, size, motion, color) {
      if (motion.spinLeft < 0.08) return;
      ctx.save();
      ctx.globalAlpha = Math.min(0.5, motion.spinLeft * 0.64);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.lineCap = "round";
      ctx.shadowColor = color;
      ctx.shadowBlur = 9;
      for (let i = 0; i < 2; i += 1) {
        const start = motion.t * 11 + i * Math.PI;
        ctx.beginPath();
        ctx.ellipse(x + 2, z + 4, 18 * size, 42 * size, -0.08, start, start + Math.PI * 0.9);
        ctx.stroke();
      }
      ctx.restore();
    }

    function diceModelDrawDie(ctx, die, elapsed, now) {
      const [x, z] = die.target;
      const motion = diceModelMotion(die, elapsed, now);
      const size = 0.94;
      const half = 0.58 * size;
      const origin = [x, z + motion.lift * -9];
      const base = DICE_MODEL_PALETTE[die.type] || DICE_MODEL_PALETTE.blank;
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(x + 7, z + 26, 34 * size * (1 - motion.lift * 0.2), 12 * size * (1 - motion.lift * 0.16), -0.16, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.48)";
      ctx.filter = "blur(2.4px)";
      ctx.fill();
      ctx.filter = "none";
      const rawVerts = [
        [-half, -half, -half], [half, -half, -half], [half, -half, half], [-half, -half, half],
        [-half, half, -half], [half, half, -half], [half, half, half], [-half, half, half],
      ];
      const modelVerts = rawVerts.map((p) => diceModelRotate(p, motion.rot[0], motion.rot[1], motion.rot[2]));
      const verts = modelVerts.map((p) => diceModelProject(p, origin, 46));
      const faces = [
        { name: "bottom", ids: [0, 1, 2, 3], tone: base.side },
        { name: "top", ids: [4, 7, 6, 5], tone: base.top },
        { name: "front", ids: [3, 2, 6, 7], tone: base.front },
        { name: "back", ids: [0, 4, 5, 1], tone: base.side },
        { name: "right", ids: [1, 5, 6, 2], tone: base.side },
        { name: "left", ids: [0, 3, 7, 4], tone: base.side },
      ].map((face) => {
        const world = face.ids.map((id) => modelVerts[id]);
        return {
          ...face,
          world,
          normal: diceModelFaceNormal(world),
          avgDepth: world.reduce((sum, p) => sum + p[2], 0) / world.length,
        };
      });
      const visibleFaces = faces
        .map((face) => {
          const pts = face.ids.map((id) => verts[id]);
          return { ...face, pts, screenSignedArea: diceModelSignedArea(pts), screenArea: diceModelArea(pts) };
        })
        .filter((face) => face.screenSignedArea < -80)
        .sort((a, b) => a.avgDepth - b.avgDepth);
      visibleFaces.forEach((face) => {
        const fillColor = diceModelSolidFaceColor(face.tone, face.normal);
        diceModelDrawFace(ctx, face.pts, fillColor);
        diceModelDrawTexturedQuad(ctx, face.pts, diceModelMakeFaceTexture(fillColor, base.c, face.name === "top" ? die.label : ""));
      });
      const edgeSet = new Set();
      visibleFaces.forEach((face) => {
        for (let i = 0; i < face.ids.length; i += 1) {
          const a = face.ids[i];
          const b = face.ids[(i + 1) % face.ids.length];
          edgeSet.add(a < b ? `${a}-${b}` : `${b}-${a}`);
        }
      });
      ctx.strokeStyle = diceModelColorMix(base.c, 0.58);
      ctx.lineWidth = 1.35;
      ctx.lineJoin = "round";
      ctx.globalAlpha = 0.58;
      edgeSet.forEach((key) => {
        const [a, b] = key.split("-").map(Number);
        ctx.beginPath();
        ctx.moveTo(verts[a][0], verts[a][1]);
        ctx.lineTo(verts[b][0], verts[b][1]);
        ctx.stroke();
      });
      ctx.restore();
    }

    function diceModelDrawCard(state, now) {
      const canvas = state.canvas;
      if (!canvas || !document.body.contains(canvas)) return false;
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = Math.max(86, Math.floor(rect.width || 108));
      const height = Math.max(74, Math.floor(rect.height || 92));
      if (canvas.width !== Math.floor(width * dpr) || canvas.height !== Math.floor(height * dpr)) {
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
      }
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);
      state.die.target = [width * 0.5, height * 0.43, 0];
      diceModelDrawDie(ctx, state.die, (now - state.start) / 1000, now);
      return state.rolling || (state.die.stopAt && now - state.die.stopAt < 520);
    }

    function diceModelCardsFrame(now) {
      let keepAnimating = false;
      diceModelRegistry.forEach((state, key) => {
        if (!state.canvas || !document.body.contains(state.canvas)) {
          diceModelRegistry.delete(key);
          return;
        }
        keepAnimating = diceModelDrawCard(state, now) || keepAnimating;
      });
      window.diceJudgementModelAudit = {
        renderer: "canvas-model-card",
        effectMode: "tumble-horizontal",
        resultPose: "top-face-up",
        diceCount: diceModelRegistry.size,
        active: keepAnimating,
      };
      if (diceModelRegistry.size && keepAnimating) {
        diceModelRaf = requestAnimationFrame(diceModelCardsFrame);
      } else {
        diceModelRaf = 0;
      }
    }

    function ensureDiceModelLoop() {
      if (!diceModelRaf) diceModelRaf = requestAnimationFrame(diceModelCardsFrame);
    }

    function mountDiceModels() {
      document.querySelectorAll(".dice-model").forEach((canvas, index) => {
        const id = canvas.getAttribute("data-dice-model-id") || `die_${index}`;
        const label = canvas.getAttribute("data-dice-label") || "空";
        const type = canvas.getAttribute("data-dice-type") || "blank";
        const rolling = canvas.getAttribute("data-dice-rolling") === "1";
        let state = diceModelRegistry.get(id);
        if (!state) {
          state = {
            canvas,
            start: performance.now(),
            rolling,
            die: diceModelMakeDie(id, label, type, index),
          };
          if (!rolling) {
            state.die.stopAt = performance.now() - 600;
            state.die.stopBase = 0;
          }
          diceModelRegistry.set(id, state);
        }
        state.canvas = canvas;
        state.die.label = label;
        state.die.type = type;
        if (rolling && !state.rolling) {
          state.start = performance.now();
          state.die.stopAt = null;
          state.die.stopBase = 0;
        }
        if (!rolling && state.rolling && !state.die.stopAt) {
          const now = performance.now();
          const local = Math.max(0, (now - state.start) / 1000 - state.die.delay);
          state.die.stopAt = now;
          state.die.stopBase = (local / DICE_MODEL_PROFILE.duration) * DICE_MODEL_PROFILE.turns * Math.PI * 2 * state.die.spinBoost;
        }
        if (!rolling && !state.rolling && !state.die.stopAt) {
          state.die.stopAt = performance.now() - 600;
          state.die.stopBase = 0;
        }
        state.rolling = rolling;
        diceModelDrawCard(state, performance.now());
      });
      ensureDiceModelLoop();
    }

    function activeParticipants() {
      return participants.slice(0, partySize);
    }

    function participantById(id) {
      return participants.find((participant) => participant.id === id);
    }

    function isInactiveSelectionFor(size) {
      return Array.from(selected).some((id) => {
        const index = participants.findIndex((participant) => participant.id === id);
        return index < 0 || index >= size;
      });
    }

    function renderFaces() {
      const active = new Set(activeParticipants().map((participant) => participant.id));
      const remaining = Math.max(0, task.maxRerolls - rerollsUsed);
      faceGrid.innerHTML = Array.from({ length: task.maxParticipants }, (_, index) => {
        const participant = participants[index];
        if (!active.has(participant.id)) {
          return `
            <div class="face-card is-inactive" aria-disabled="true">
              <div class="face-top">
                <div class="portrait">${index + 1}</div>
                <div>
                  <div class="face-owner">未参判</div>
                  <div class="face-meta">未启用</div>
                </div>
              </div>
              <div class="face-die">
                <canvas class="dice-model" data-dice-model-id="inactive-${index + 1}" data-dice-label="空" data-dice-type="blank" data-dice-rolling="0" aria-label="未参判空骰"></canvas>
                <span class="die-chip-fallback">空</span>
              </div>
              <div class="card-action">未开放</div>
            </div>
          `;
        }
        const face = currentFace(participant);
        const isSelected = selected.has(participant.id);
        const selectedClass = isSelected ? " is-selected" : "";
        const rerollClass = !isSelected && remaining > 0 ? " will-reroll" : "";
        const statusText = isSelected ? "已计入" : "未计入";
        const statusClass = isSelected ? " is-kept" : "";
        const actionText = isSelected
            ? "移出"
            : "计入";
        const modelType = faceModelType(face);
        const isRolling = rollingIds.has(participant.id);
        return `
          <button class="face-card${selectedClass}${rerollClass}" type="button" data-face-card="${participant.id}">
            <div class="face-top">
              <div class="portrait">${participant.portrait}</div>
              <div>
                <div class="face-owner">${participant.owner}</div>
                <div class="face-meta">${participant.role}</div>
              </div>
            </div>
            <div class="face-status${statusClass}">${statusText}</div>
            <div class="face-die">
              <canvas class="dice-model" data-dice-model-id="${escapeHtml(participant.id)}" data-dice-label="${escapeHtml(face.label)}" data-dice-type="${modelType}" data-dice-rolling="${isRolling ? "1" : "0"}" aria-label="${escapeHtml(participant.owner)} ${escapeHtml(face.label)}"></canvas>
              <span class="die-chip-fallback">${escapeHtml(face.label)}</span>
            </div>
            <div class="card-action">${actionText}</div>
          </button>
        `;
      }).join("");
    }

    function getTotals() {
      const totals = { explore: 0, insight: 0 };
      selected.forEach((id) => {
        const participant = participantById(id);
        if (!participant) return;
        const face = currentFace(participant);
        Object.entries(face.contributes).forEach(([key, value]) => {
          totals[key] += value;
        });
      });
      const effective = Object.values(totals).reduce((sum, value) => sum + value, 0);
      return { totals, effective };
    }

    function rerollCandidates() {
      return activeParticipants().filter((participant) => !selected.has(participant.id));
    }

    function renderWorkbenchState() {
      const picked = activeParticipants().filter((participant) => selected.has(participant.id));
      const candidates = rerollCandidates();
      selectedCount.textContent = `计入 ${picked.length}/${partySize}`;
      const names = candidates.map((participant) => participant.owner).join("、");
      const rangeText = candidates.length
        ? `将重投 ${candidates.length} 颗：${names}`
        : "将重投：无";
      rerollRange.innerHTML = `<span>${rangeText}</span>`;
    }

    function setMeter(key, total, fillEl, countEl) {
      const target = task.needs[key].target;
      const clamped = Math.min(1, total / target);
      fillEl.style.width = `${Math.round(clamped * 100)}%`;
      countEl.textContent = `${total} / ${target}`;
      countEl.classList.toggle("is-covered", total >= target);
    }

    function renderTargets() {
      const { totals, effective } = getTotals();
      const missing = Math.max(0, task.target - effective);
      const success = effective >= task.target;
      const progress = Math.min(1, effective / task.target);
      const hasSelection = selected.size > 0;

      scoreRing.style.setProperty("--ring-alpha", String(progress * 0.92));
      scoreRing.style.setProperty("--ring-width", `${Math.round(progress * 100)}%`);
      scoreRing.classList.toggle("is-success", success);
      scoreNumber.textContent = `${effective}/${task.target}`;

      if (!hasSelection) {
        resultLine.textContent = "尚未选择骰面";
        resultDetail.textContent = "";
      } else if (success) {
        resultLine.textContent = "已达标";
        resultDetail.textContent = "";
      } else {
        resultLine.textContent = `未达标 · 还差 ${missing} 点`;
        resultDetail.textContent = "";
      }

      setMeter("explore", totals.explore, exploreFill, exploreCount);
      setMeter("insight", totals.insight, insightFill, insightCount);

      renderPreview(success, hasSelection, missing, effective, totals);
      renderControls(success, hasSelection, missing);
    }

    function renderPreview(success, hasSelection, missing, effective, totals) {
      previewCard.classList.toggle("is-success", success);
      previewCard.classList.toggle("is-fail", !success);

      if (!hasSelection) {
        previewCardTitle.textContent = "尚未选择";
        previewList.innerHTML = `
          <div>计入骰面后可提交判定。</div>
        `;
        submitButton.disabled = true;
        submitButton.textContent = "请选择骰面";
        return;
      }

      previewCardTitle.textContent = "若现在提交";
      if (success) {
        previewList.innerHTML = `
          <div>获得档案残页素材。</div>
          <div>推进军方火球记录。</div>
        `;
      } else {
        previewList.innerHTML = `
          <div>不获得阶段素材。</div>
          <div>线索进度不变。</div>
        `;
      }
    }

    function renderControls(success, hasSelection, missing) {
      const remaining = Math.max(0, task.maxRerolls - rerollsUsed);
      const candidates = rerollCandidates();
      rerollCount.textContent = `${remaining} / ${task.maxRerolls}`;
      rerollButton.classList.toggle("is-secondary", success);
      rerollButton.disabled = remaining <= 0 || candidates.length <= 0;

      if (remaining <= 0) {
        rerollButton.textContent = "重投次数已用完";
      } else if (!candidates.length) {
        rerollButton.textContent = "无可重投骰面";
      } else {
        rerollButton.textContent = "重投未计入骰面";
      }

      if (!hasSelection) {
        submitButton.disabled = true;
        submitButton.textContent = "请选择骰面";
        controlHint.textContent = "";
        return;
      }

      submitButton.disabled = false;
      submitButton.textContent = "提交判定";

      if (success) {
        controlHint.textContent = "";
      } else if (candidates.length && remaining > 0) {
        controlHint.textContent = "";
      } else if (remaining <= 0) {
        controlHint.textContent = "";
      } else {
        controlHint.textContent = "移出已计入骰面后可重投。";
      }
    }

    function render() {
      partyMeta.textContent = "线索任务 · 消耗 1 行动点";
      renderFaces();
      mountDiceModels();
      renderWorkbenchState();
      renderTargets();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("is-visible");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("is-visible"), 1700);
    }

    faceGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-face-card]");
      if (!button || button.disabled) return;
      const id = button.dataset.faceCard;
      if (selected.has(id)) {
        selected.delete(id);
      } else {
        if (selected.size >= partySize) {
          showToast(`本次最多计入 ${partySize} 名参判角色的骰面，请先取消一个已计入骰面。`);
          return;
        }
        selected.add(id);
      }
      render();
    });

    rerollButton.addEventListener("click", () => {
      if (rerollButton.disabled) return;
      const candidates = rerollCandidates();
      if (!candidates.length) {
        showToast("当前没有未计入骰面可重投。");
        return;
      }
      if (rerollsUsed >= task.maxRerolls) {
        showToast("重投次数已用完。");
        return;
      }
      const rerolledNames = candidates.map((participant) => participant.owner);
      candidates.forEach((participant) => rollingIds.add(participant.id));
      candidates.forEach((participant) => {
        participant.faceIndex = (participant.faceIndex + 1) % participant.faces.length;
      });
      rerollsUsed += 1;
      render();
      window.setTimeout(() => {
        candidates.forEach((participant) => rollingIds.delete(participant.id));
        render();
      }, 640);
      showToast(`已重投：${rerolledNames.join("、")}。`);
    });

    document.getElementById("partyToggle").addEventListener("click", (event) => {
      const button = event.target.closest("[data-party-size]");
      if (!button) return;
      const nextSize = Number(button.dataset.partySize);
      if (!Number.isFinite(nextSize) || nextSize === partySize) return;
      if (selected.size > nextSize || isInactiveSelectionFor(nextSize)) {
        showToast(`切换为 ${nextSize} 人判定前，请先手动取消多余骰面。`);
        return;
      }
      partySize = nextSize;
      document.querySelectorAll("[data-party-size]").forEach((item) => {
        item.classList.toggle("is-active", Number(item.dataset.partySize) === partySize);
      });
      render();
    });

    submitButton.addEventListener("click", () => {
      if (submitButton.disabled) return;
      const remaining = Math.max(0, task.maxRerolls - rerollsUsed);
      const candidates = rerollCandidates();
      const { effective } = getTotals();
      const success = effective >= task.target;
      if (!success && remaining > 0 && candidates.length) {
        showToast("当前未达标，仍可重投。");
        return;
      }
      showToast(success
        ? "判定已提交。"
        : "当前未达标，判定未推进。");
    });

    document.querySelector(".close-button").addEventListener("click", () => {
      showToast("已关闭判定。");
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        showToast("已关闭判定。");
      }
    });

    render();
  </script>
</body>
</html>
