<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Angus 世界探索 P0/P1 UI 实验</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d13;
      --ink: #eef4fb;
      --muted: #93a4b8;
      --soft: #c7d2e2;
      --panel: rgba(14, 20, 30, 0.93);
      --panel-2: rgba(19, 28, 39, 0.9);
      --line: rgba(148, 163, 184, 0.28);
      --line-strong: rgba(214, 170, 87, 0.58);
      --gold: #d7aa55;
      --gold-2: #f0cc7a;
      --blue: #63b3ff;
      --green: #41d18a;
      --red: #fb6a62;
      --orange: #f5a63d;
      --violet: #a78bfa;
      --cyan: #67e8f9;
      --shadow: rgba(0, 0, 0, 0.46);
      --cost: #fb7185;
      --reward: #34d399;
      --condition: #60a5fa;
      --info: #a78bfa;
      --r: 8px;
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 12%, rgba(103, 232, 249, 0.08), transparent 26%),
        radial-gradient(circle at 82% 18%, rgba(215, 170, 85, 0.09), transparent 24%),
        linear-gradient(180deg, #101722 0%, var(--bg) 68%);
    }
    button {
      font: inherit;
      color: inherit;
      border: 0;
      cursor: pointer;
    }
    .shell {
      width: min(1460px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 20px 0 18px;
    }
    .topbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 0 0 12px;
      border-bottom: 1px solid rgba(215, 170, 85, 0.28);
      margin-bottom: 14px;
    }
    .back-link {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 7px;
      background: rgba(7, 12, 20, 0.62);
      color: #cbd5e1;
      font-weight: 800;
    }
    .back-link:hover { border-color: rgba(215, 170, 85, 0.48); color: #ffe7aa; }
    .phase-rail {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }
    .phase-step {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 999px;
      background: rgba(7, 12, 20, 0.44);
      color: #7f8ca3;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }
    .phase-step b {
      display: grid;
      place-items: center;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.26);
      color: #cbd5e1;
      font-size: 10px;
      line-height: 1;
    }
    .phase-step.active {
      border-color: rgba(96, 165, 250, 0.52);
      background: rgba(37, 99, 235, 0.22);
      color: #dbeafe;
      box-shadow: 0 0 18px rgba(96, 165, 250, 0.13);
    }
    .phase-step.active b { background: var(--blue); color: white; }
    .phase-divider {
      flex: 0 0 36px;
      height: 1px;
      background: rgba(148, 163, 184, 0.22);
    }
    .week-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(7, 12, 20, 0.48);
      color: var(--soft);
      font-size: 12px;
      white-space: nowrap;
    }
    .pill.gold { border-color: rgba(215, 170, 85, 0.48); color: #ffe5a8; }
    .pill.green { border-color: rgba(65, 209, 138, 0.46); color: #b8f7d2; }
    .pill.red { border-color: rgba(251, 106, 98, 0.58); color: #fecaca; }
    .pill.violet { border-color: rgba(167, 139, 250, 0.48); color: #ddd6fe; }
    .layout {
      display: grid;
      grid-template-columns: minmax(560px, 1.08fr) minmax(410px, 0.92fr);
      gap: 14px;
      align-items: stretch;
    }
    .surface {
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(15, 23, 34, 0.96), rgba(9, 14, 22, 0.94));
      box-shadow: 0 20px 46px rgba(0, 0, 0, 0.32);
      overflow: hidden;
    }
    .surface-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(6, 11, 18, 0.54);
    }
    .surface-head h2 {
      margin: 0;
      font-size: 16px;
      color: var(--gold-2);
      letter-spacing: 0;
    }
    .map-wrap {
      position: relative;
      min-height: 690px;
      isolation: isolate;
      overflow: hidden;
      background:
        linear-gradient(rgba(6, 11, 18, 0.32), rgba(6, 11, 18, 0.62)),
        url("../full-chain-demo/Assets/world-map-background.svg") center/cover no-repeat,
        #07101b;
    }
    .map-wrap:before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(103, 232, 249, 0.10) 1px, transparent 1px),
        linear-gradient(0deg, rgba(103, 232, 249, 0.10) 1px, transparent 1px);
      background-size: 118px 118px;
      opacity: 0.62;
      pointer-events: none;
      z-index: 1;
    }
    .map-wrap:after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 35%, rgba(99, 179, 255, 0.16), transparent 13%),
        radial-gradient(circle at 78% 44%, rgba(167, 139, 250, 0.12), transparent 13%),
        radial-gradient(circle at 55% 56%, rgba(65, 209, 138, 0.10), transparent 14%);
      z-index: 1;
      pointer-events: none;
    }
    .route-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .route-layer path {
      fill: none;
      stroke: rgba(215, 170, 85, 0.32);
      stroke-width: 1.5;
      stroke-dasharray: 8 8;
    }
    .region-pin {
      position: absolute;
      z-index: 4;
      left: var(--x);
      top: var(--y);
      transform: translate(-50%, -50%);
      display: inline-grid;
      grid-template-columns: 20px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      min-width: 178px;
      min-height: 40px;
      padding: 6px 8px;
      border: 1px solid rgba(148, 163, 184, 0.42);
      border-radius: 999px;
      background: rgba(7, 12, 20, 0.94);
      box-shadow: 0 14px 28px var(--shadow);
      color: #dbe7f3;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease, opacity 160ms ease;
    }
    .region-pin:not(.locked):hover,
    .region-pin.is-previewed,
    .region-pin.is-selected {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 1px rgba(215, 170, 85, 0.18), 0 18px 32px var(--shadow);
      transform: translate(-50%, -50%) translateY(-2px);
    }
    .region-pin.is-selected {
      color: #fff2c9;
      background: linear-gradient(180deg, rgba(72, 53, 20, 0.96), rgba(18, 21, 26, 0.96));
    }
    .region-pin.locked {
      opacity: 0.75;
      border-style: dashed;
      color: #b8c2d0;
      cursor: default;
    }
    .pin-dot {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid currentColor;
      display: grid;
      place-items: center;
      color: var(--blue);
      box-shadow: 0 0 0 6px rgba(99, 179, 255, 0.13);
      background: rgba(7, 12, 20, 0.9);
    }
    .region-pin.locked .pin-dot { color: #94a3b8; box-shadow: 0 0 0 6px rgba(148, 163, 184, 0.10); }
    .region-pin .label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 800;
    }
    .pin-count {
      display: inline-grid;
      place-items: center;
      min-width: 27px;
      height: 24px;
      padding: 0 7px;
      border: 1px solid rgba(215, 170, 85, 0.48);
      border-radius: 999px;
      color: #ffe7aa;
      font-size: 12px;
      font-weight: 900;
    }
    .pin-count.locked { border-color: rgba(148, 163, 184, 0.38); color: #cbd5e1; }
    .map-legend {
      position: absolute;
      z-index: 5;
      left: 12px;
      bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: calc(100% - 24px);
    }
    .detail {
      min-height: 690px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .region-switcher {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(5, 10, 17, 0.34);
    }
    .choice {
      min-height: 48px;
      padding: 7px 8px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: var(--r);
      background: rgba(10, 16, 25, 0.82);
      text-align: left;
      display: grid;
      gap: 4px;
    }
    .choice:not(.locked):hover,
    .choice.is-previewed,
    .choice.is-selected {
      border-color: rgba(215, 170, 85, 0.62);
    }
    .choice.is-selected {
      background: rgba(74, 55, 22, 0.48);
    }
    .choice.locked {
      cursor: default;
      border-style: dashed;
      background: rgba(10, 16, 25, 0.42);
      opacity: 0.62;
      filter: saturate(0.48);
    }
    .choice strong {
      font-size: 12px;
      color: #edf5ff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .choice span {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-body {
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .region-title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }
    .region-kicker {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }
    .region-name {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      color: #fff5d6;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }
    .summary {
      min-height: 70px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: var(--r);
      background: rgba(9, 14, 22, 0.72);
      padding: 8px;
      display: grid;
      align-content: space-between;
      gap: 6px;
    }
    .summary .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }
    .summary strong {
      font-size: 18px;
      color: #f8fafc;
    }
    .intel-section {
      display: grid;
      gap: 8px;
    }
    .intel-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .intel-section-head h4 {
      margin: 0;
      color: var(--gold-2);
      font-size: 14px;
    }
    .slot-list {
      display: grid;
      gap: 8px;
    }
    .slot {
      position: relative;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      min-height: 76px;
      padding: 9px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: var(--r);
      background: rgba(12, 18, 27, 0.58);
      overflow: hidden;
    }
    .slot:before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: rgba(148, 163, 184, 0.44);
    }
    .slot.target:before { background: var(--blue); }
    .slot.timer:before { background: var(--red); }
    .slot.clue:before { background: var(--green); }
    .slot.deep:before { background: var(--violet); }
    .slot.locked:before { background: #94a3b8; }
    .slot-icon {
      width: 34px;
      height: 34px;
      border: 1px solid currentColor;
      border-radius: var(--r);
      display: grid;
      place-items: center;
      background: rgba(5, 10, 17, 0.72);
      color: var(--soft);
    }
    .slot.target .slot-icon { color: var(--blue); }
    .slot.timer .slot-icon { color: var(--red); }
    .slot.clue .slot-icon { color: var(--green); }
    .slot.deep .slot-icon { color: var(--violet); }
    .slot-main {
      min-width: 0;
      display: grid;
      gap: 6px;
    }
    .slot-title {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
      color: #f8fafc;
      font-weight: 850;
    }
    .slot-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .mini-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 23px;
      padding: 3px 7px;
      border: 1px solid rgba(148, 163, 184, 0.26);
      border-radius: 999px;
      background: rgba(5, 10, 17, 0.58);
      color: #cad6e5;
      font-size: 11px;
      white-space: nowrap;
    }
    .mini-chip.cost { border-color: rgba(251, 113, 133, 0.54); color: #fecdd3; background: rgba(127, 29, 29, 0.18); }
    .mini-chip.reward { border-color: rgba(52, 211, 153, 0.48); color: #bbf7d0; background: rgba(6, 95, 70, 0.16); }
    .mini-chip.condition { border-color: rgba(96, 165, 250, 0.48); color: #bfdbfe; background: rgba(30, 64, 175, 0.15); }
    .mini-chip.challenge { border-color: rgba(245, 158, 11, 0.56); color: #fde68a; background: rgba(120, 53, 15, 0.18); }
    .mini-chip.info { border-color: rgba(167, 139, 250, 0.52); color: #ddd6fe; background: rgba(76, 29, 149, 0.16); }
    .mini-chip.status { border-color: rgba(215, 170, 85, 0.46); color: #ffe5a8; background: rgba(120, 53, 15, 0.16); }
    .countdown {
      display: grid;
      place-items: center;
      min-width: 64px;
      height: 52px;
      border: 1px solid rgba(251, 106, 98, 0.82);
      border-radius: var(--r);
      background: linear-gradient(180deg, rgba(127, 29, 29, 0.94), rgba(56, 8, 12, 0.94));
      color: white;
      box-shadow: inset 0 0 18px rgba(251, 106, 98, 0.16);
    }
    .countdown small {
      color: #fecaca;
      font-size: 10px;
      line-height: 1;
    }
    .countdown strong {
      font-size: 19px;
      line-height: 1;
    }
    .unlock-list {
      display: grid;
      gap: 9px;
    }
    .unlock-item {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: var(--r);
      background: rgba(9, 14, 22, 0.72);
      padding: 9px;
      display: grid;
      gap: 7px;
    }
    .unlock-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #e2e8f0;
      font-size: 12px;
    }
    .bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.18);
      overflow: hidden;
    }
    .bar > span {
      display: block;
      width: var(--p);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--gold));
    }
    .gap-text {
      color: var(--muted);
      font-size: 12px;
    }
    .detail-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px 14px;
      border-top: 1px solid var(--line);
      background: rgba(5, 10, 17, 0.58);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 7px;
      background: rgba(26, 36, 49, 0.9);
      color: #dbe7f3;
      font-weight: 800;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      border-color: rgba(215, 170, 85, 0.56);
      color: #ffe7aa;
    }
    .btn.primary {
      min-width: 260px;
      border-color: rgba(215, 170, 85, 0.68);
      background: linear-gradient(180deg, rgba(155, 107, 24, 0.98), rgba(88, 58, 15, 0.98));
      color: #fff7dd;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
    }
    .btn.secondary {
      color: #aebdd0;
      background: rgba(16, 23, 33, 0.8);
    }
    .btn:disabled {
      opacity: 0.46;
      cursor: not-allowed;
    }
    .action-log {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: var(--r);
      background: rgba(5, 10, 17, 0.35);
      color: var(--muted);
      font-size: 12px;
    }
    .action-log summary {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      cursor: pointer;
      color: #cbd5e1;
      font-weight: 800;
    }
    .action-log summary::-webkit-details-marker { display: none; }
    .action-log ul {
      margin: 0;
      padding: 0 10px 10px 28px;
      line-height: 1.6;
    }
    svg.icon {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .slot-icon svg.icon,
    .pin-dot svg.icon { width: 17px; height: 17px; }
    @media (max-width: 1080px) {
      .topbar { grid-template-columns: 1fr; }
      .week-line { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      .map-wrap { min-height: 560px; }
      .detail { min-height: 0; }
    }
    @media (max-width: 720px) {
      .shell { width: min(100vw - 18px, 720px); padding-top: 12px; }
      .topbar { grid-template-columns: 1fr; }
      .phase-rail { overflow-x: auto; padding-bottom: 3px; }
      .phase-divider { flex-basis: 22px; }
      .map-wrap { min-height: 520px; }
      .region-pin {
        min-width: 142px;
        max-width: 178px;
        grid-template-columns: 18px minmax(0, 1fr);
      }
      .pin-count { display: none; }
      .summary-grid,
      .region-switcher { grid-template-columns: 1fr; }
      .slot { grid-template-columns: 34px minmax(0, 1fr); }
      .slot .countdown { grid-column: 1 / -1; justify-self: start; }
      .detail-actions {
        display: grid;
        grid-template-columns: 1fr;
      }
      .btn.primary { min-width: 0; width: 100%; }
    }
  </style>
</head>

      <rect x="4" y="4" width="16" height="16" rx="4"></rect><circle cx="9" cy="9" r="1"></circle><circle cx="15" cy="9" r="1"></circle><circle cx="9" cy="15" r="1"></circle><circle cx="15" cy="15" r="1"></circle>
    </symbol>
    <symbol id="i-warning" viewBox="0 0 24 24">
      <path d="m12 3 10 18H2z"></path><path d="M12 9v5"></path><path d="M12 18h.01"></path>
    </symbol>
    <symbol id="i-search" viewBox="0 0 24 24">
      <circle cx="10.5" cy="10.5" r="6.5"></circle><path d="M15.5 15.5 21 21"></path>
    </symbol>
  </svg>

  <main class="shell">
    <header class="topbar">
      <button type="button" class="back-link">← 回合简报</button>
      <nav class="phase-rail" aria-label="本周流程">
        <span class="phase-step active"><b>1</b>探索</span>
        <span class="phase-divider" aria-hidden="true"></span>
        <span class="phase-step"><b>2</b>线索成稿</span>
        <span class="phase-divider" aria-hidden="true"></span>
        <span class="phase-step"><b>3</b>拖拽组版</span>
        <span class="phase-divider" aria-hidden="true"></span>
        <span class="phase-step"><b>4</b>结算</span>
      </nav>
      <div class="week-line" aria-label="探索周状态">
        <span class="pill gold">第 1 周</span>
        <span class="pill">剩余 7 日</span>
        <span class="pill green">可派遣 8/8</span>
      </div>
    </header>

    <section class="layout">
      <section class="surface" aria-labelledby="mapTitle">
        <div class="surface-head">
          <h2 id="mapTitle">世界取材图</h2>
          <span class="pill" id="selectionBadge">已选 北美禁区带</span>
        </div>
        <div class="map-wrap" id="map">
          <svg class="route-layer" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M20 35 C 36 18, 62 24, 78 44"></path>
            <path d="M20 35 C 34 56, 45 62, 56 54"></path>
            <path d="M56 54 C 64 48, 72 47, 78 44"></path>
          </svg>
          <button type="button" class="region-pin" data-region="us" style="--x:20%;--y:35%;">
            <span class="pin-dot"><svg class="icon"><use href="#i-target"></use></svg></span>
            <span class="label">北美禁区带</span>
            <span class="pin-count">4</span>
          </button>
          <div class="region-pin locked" data-region="east_asia" style="--x:78%;--y:44%;" aria-disabled="true">
            <span class="pin-dot"><svg class="icon"><use href="#i-lock"></use></svg></span>
            <span class="label">东亚神秘地带</span>
            <span class="pin-count locked">82%</span>
          </div>
          <div class="region-pin locked" data-region="pacific" style="--x:56%;--y:54%;" aria-disabled="true">
            <span class="pin-dot"><svg class="icon"><use href="#i-lock"></use></svg></span>
            <span class="label">太平洋岛屿群</span>
            <span class="pin-count locked">80%</span>
          </div>
          <div class="map-legend">
            <span class="pill gold"><svg class="icon"><use href="#i-enter"></use></svg>选中区域可进入</span>
            <span class="pill red"><svg class="icon"><use href="#i-clock"></use></svg>限时机会</span>
            <span class="pill violet"><svg class="icon"><use href="#i-stack"></use></svg>深度链</span>
          </div>
        </div>
      </section>

      <aside class="surface detail" aria-labelledby="detailTitle">
        <div class="surface-head">
          <h2 id="detailTitle">选中区域详情</h2>
          <span class="pill" id="detailMode">已选</span>
        </div>
        <div class="region-switcher" id="regionSwitcher" aria-label="区域切换"></div>
        <div class="detail-body" id="detailBody" aria-live="polite"></div>
        <div class="detail-actions">
          <button type="button" class="btn primary" id="enterBtn"><svg class="icon"><use href="#i-enter"></use></svg><span>进入探索 · 北美禁区带</span></button>
        </div>
      </aside>
    </section>
  </main>

  <script>
    (() => {
      const regions = {
        us: {
          name: "北美禁区带",
          status: "当前取材地区",
          unlocked: true,
          difficulty: "难度：中等",
          recommend: "推荐 ★★★",
          flavor: "初始取材区，都市传说、禁区和临时情报都已可见。先确认地区，再进入区域内选择具体任务。",
          summary: [
            ["可见目标", "4", "target"],
            ["限时机会", "1", "timer"],
            ["线索", "1", "clue"],
            ["深度链", "1", "deep"],
          ],
          slots: [
            {
              tone: "target",
              icon: "i-target",
              title: "51 区外围公路",
              meta: ["成本 2天", "条件：探索2", "条件：生存1", "挑战：对手骰2", "收益 常驻线索"],
            },
            {
              tone: "timer",
              icon: "i-clock",
              title: "突发：雷达异常光点",
              meta: ["成本 2天", "条件：探索2", "条件：生存1", "挑战：危险", "收益 截稿素材"],
              countdown: "2天",
            },
            {
              tone: "clue",
              icon: "i-clue",
              title: "北美禁区带 非正式研究记录",
              meta: ["成本 2天", "条件：人脉1", "条件：洞察1", "信息 调查后生成任务"],
            },
            {
              tone: "deep",
              icon: "i-stack",
              title: "球状闪电 · 厨房火球",
              meta: ["成本 1天", "条件：理性2", "条件：洞察2", "信息 深度调查 · 当前任务2"],
            },
          ],
          log: [
            "雷达异常光点剩余 2 天。",
            "球状闪电链条已解锁当前环。",
            "51 区外围公路仍可反复调查。",
          ],
        },
        east_asia: {
          name: "东亚神秘地带",
          status: "未解锁",
          unlocked: false,
          flavor: "当地线人愿意接触，但报社影响力还不够稳定。",
          summary: [
            ["可见目标", "0", "target"],
            ["缺口", "2", "locked"],
            ["线索", "待开", "clue"],
            ["深度链", "待开", "deep"],
          ],
          unlocks: [
            { label: "声望", value: 45, max: 55, gap: "还差 10" },
            { label: "罗斯威尔残页", value: 0, max: 1, gap: "完成北美深度链第一环" },
          ],
          previewSlots: [
            { tone: "locked", icon: "i-lock", title: "神农架毛发样本采集", meta: ["信息 目标轮廓已记录", "条件：区域解锁后显示需求"] },
            { tone: "locked", icon: "i-stack", title: "未解锁的链式线索", meta: ["条件：需要前置证据", "信息 深度调查待开启"] },
          ],
        },
        pacific: {
          name: "太平洋岛屿群",
          status: "未解锁",
          unlocked: false,
          flavor: "观测合作与航线许可都卡在审批边缘。",
          summary: [
            ["可见目标", "0", "target"],
            ["缺口", "2", "locked"],
            ["限时机会", "待开", "timer"],
            ["深度链", "待开", "deep"],
          ],
          unlocks: [
            { label: "公信", value: 42, max: 60, gap: "还差 18" },
            { label: "守序", value: 48, max: 60, gap: "还差 12" },
          ],
          previewSlots: [
            { tone: "locked", icon: "i-lock", title: "复活节岛石像热异常", meta: ["条件：观测许可未到位", "信息 区域解锁后显示需求"] },
          ],
        },
      };

      let selectedId = "us";
      let previewId = null;

      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
      const icon = (id) => `<svg class="icon"><use href="#${id}"></use></svg>`;
      const escapeHtml = (text) => String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

      function currentId() {
        return previewId || selectedId;
      }

      function chipClass(text) {
        if (/挑战：|对手骰/.test(text)) return "challenge";
        if (/成本|耗时/.test(text)) return "cost";
        if (/收益|素材|线索/.test(text)) return "reward";
        if (/条件：/.test(text)) return "condition";
        if (/信息|深度|调查后|当前任务/.test(text)) return "info";
        return "";
      }

      function renderSummary(region) {
        return `<div class="summary-grid">${region.summary.map(([label, value, tone]) => `
          <div class="summary">
            <div class="top"><span>${escapeHtml(label)}</span>${summaryIcon(tone)}</div>
            <strong>${escapeHtml(value)}</strong>
          </div>
        `).join("")}</div>`;
      }

      function summaryIcon(tone) {
        const ids = { target: "i-target", timer: "i-clock", clue: "i-clue", deep: "i-stack", locked: "i-lock" };
        return icon(ids[tone] || "i-map");
      }

      function renderSlot(slot) {
        return `<article class="slot ${slot.tone}">
          <div class="slot-icon">${icon(slot.icon)}</div>
          <div class="slot-main">
            <h3 class="slot-title">${escapeHtml(slot.title)}</h3>
            <div class="slot-meta">
              ${slot.meta.map((m) => `<span class="mini-chip ${chipClass(m)}">${escapeHtml(m)}</span>`).join("")}
            </div>
          </div>
          ${slot.countdown ? `<div class="countdown"><small>剩余</small><strong>${escapeHtml(slot.countdown)}</strong></div>` : ""}
        </article>`;
      }

      function renderUnlocks(region) {
        return `<div class="unlock-list">${region.unlocks.map((item) => {
          const pct = Math.max(0, Math.min(100, Math.round((item.value / item.max) * 100)));
          return `<div class="unlock-item">
            <div class="unlock-top">
              <strong>${escapeHtml(item.label)}</strong>
              <span>${escapeHtml(item.value)} / ${escapeHtml(item.max)}</span>
            </div>
            <div class="bar" aria-label="${escapeHtml(item.label)} ${pct}%"><span style="--p:${pct}%"></span></div>
            <div class="gap-text">${escapeHtml(item.gap)}</div>
          </div>`;
        }).join("")}</div>`;
      }

      function renderDetail() {
        const id = currentId();
        const region = regions[id];
        const isPreview = !!previewId && previewId !== selectedId;
        $("#selectionBadge").textContent = `${isPreview ? "预览" : "已选"} ${region.name}`;
        $("#detailMode").textContent = isPreview ? "预览" : "已选";
        $("#detailMode").className = `pill ${region.unlocked ? "gold" : ""}`;
        const statusPill = region.unlocked ? `${region.difficulty} | ${region.recommend}` : "进度缺口";
        $("#detailBody").innerHTML = `
          <div class="region-title-row">
            <div>
              <div class="region-kicker">${escapeHtml(region.status)}</div>
              <h3 class="region-name">${escapeHtml(region.name)}</h3>
            </div>
            <span class="pill ${region.unlocked ? "green" : ""}">${escapeHtml(statusPill)}</span>
          </div>
          <div class="gap-text">${escapeHtml(region.flavor)}</div>
          ${renderSummary(region)}
          ${region.unlocked ? `
            <section class="intel-section" aria-label="区域情报预览">
              <div class="intel-section-head"><h4>区域情报预览</h4><span>${region.slots.length} 条 · 进入后选择任务</span></div>
              <div class="slot-list">${region.slots.map(renderSlot).join("")}</div>
            </section>
            <details class="action-log">
              <summary><span>本周行动日志</span><span>展开</span></summary>
              <ul>${region.log.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
            </details>
          ` : `${renderUnlocks(region)}<section class="intel-section" aria-label="锁定区域预览"><div class="intel-section-head"><h4>锁定情报轮廓</h4><span>只读</span></div><div class="slot-list">${region.previewSlots.map(renderSlot).join("")}</div></section>`}
        `;
        const enterBtn = $("#enterBtn");
        enterBtn.disabled = !regions[selectedId].unlocked;
        $("span", enterBtn).textContent = regions[selectedId].unlocked ? `进入探索 · ${regions[selectedId].name}` : "缺口未补齐";
        updateLinkedState();
      }

      function renderSwitcher() {
        $("#regionSwitcher").innerHTML = Object.entries(regions).map(([id, r]) => `
          <button type="button" class="choice ${r.unlocked ? "" : "locked"}" data-region="${id}" aria-pressed="${id === selectedId ? "true" : "false"}" ${r.unlocked ? "" : "disabled aria-disabled=\"true\""}>
            <strong>${escapeHtml(r.name)}</strong>
            <span>${r.unlocked ? `${escapeHtml(r.difficulty)} · ${escapeHtml(r.recommend)}` : "未解锁 · 显示缺口"}</span>
          </button>
        `).join("");
        $$(".choice").forEach((btn) => {
          const id = btn.dataset.region;
          if (!regions[id].unlocked) return;
          btn.addEventListener("mouseenter", () => {
            previewId = id;
            renderDetail();
          });
          btn.addEventListener("mouseleave", () => {
            previewId = null;
            renderDetail();
          });
          btn.addEventListener("click", () => {
            selectedId = id;
            previewId = null;
            renderSwitcher();
            renderDetail();
          });
        });
      }

      function updateLinkedState() {
        const id = currentId();
        $$(".region-pin, .choice").forEach((el) => {
          const same = el.dataset.region === id;
          el.classList.toggle("is-previewed", same && previewId !== null);
          el.classList.toggle("is-selected", el.dataset.region === selectedId && previewId === null);
          if (el.classList.contains("choice")) el.setAttribute("aria-pressed", el.dataset.region === selectedId ? "true" : "false");
        });
      }

      function bindMap() {
        $$(".region-pin").forEach((btn) => {
          const id = btn.dataset.region;
          if (!regions[id].unlocked) return;
          btn.addEventListener("mouseenter", () => {
            previewId = id;
            renderDetail();
          });
          btn.addEventListener("mouseleave", () => {
            previewId = null;
            renderDetail();
          });
          btn.addEventListener("click", () => {
            selectedId = id;
            previewId = null;
            renderSwitcher();
            renderDetail();
          });
        });
      }

      $("#enterBtn").addEventListener("click", () => {
        if (!regions[selectedId].unlocked) return;
        $("#selectionBadge").textContent = `准备进入 ${regions[selectedId].name}`;
      });

      bindMap();
      renderSwitcher();
      renderDetail();
    })();
  </script>
</body>
</html>
