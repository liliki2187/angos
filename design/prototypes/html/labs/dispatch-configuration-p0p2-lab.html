<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>派遣配置排序标签实验页</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080d16;
      --panel: #0f172a;
      --panel-2: #111c2e;
      --line: #26344a;
      --text: #e5edf8;
      --muted: #94a3b8;
      --weak: #64748b;
      --gold: #d4a853;
      --gold-2: #f8df9a;
      --red: #ef6666;
      --green: #40d37b;
      --blue: #60a5fa;
      --cyan: #38c7e8;
      --violet: #a78bfa;
      --teal: #34d399;
      --orange: #f59e0b;
      font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(96,165,250,0.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(96,165,250,0.04) 1px, transparent 1px),
        linear-gradient(180deg, #0a111d 0%, var(--bg) 70%);
      background-size: 44px 44px, 44px 44px, auto;
    }
    button { font: inherit; color: inherit; }
    .page {
      width: min(1380px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 16px 0 24px;
    }
    .dispatch-lab-shell { display: grid; gap: 10px; }
    .dispatch-lab-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      min-height: 38px;
    }
    .nav-return {
      min-width: 96px;
      min-height: 36px;
      border: 1px solid rgba(148,163,184,0.34);
      border-radius: 7px;
      background: rgba(15,23,42,0.72);
      color: #dbeafe;
      font-weight: 850;
    }
    h1, h2, h3, p { margin: 0; }
    .dispatch-lab-top h1 {
      font-size: 18px;
      line-height: 1.25;
      color: #f8fafc;
      text-align: center;
    }
    .risk-reason {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .status-pills {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 7px;
      color: #8fa1ba;
      font-size: 12px;
    }
    .status-pills span {
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 999px;
      background: rgba(15,23,42,0.44);
      white-space: nowrap;
    }
    .dispatch-lab-task,
    .dispatch-lab-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(17,28,46,0.94), rgba(10,16,27,0.96));
      padding: 10px;
      box-shadow: inset 0 1px 0 rgba(148,163,184,0.06);
    }
    .dispatch-lab-task {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border-color: rgba(239,102,102,0.48);
      border-top-color: rgba(245,158,11,0.78);
    }
    .task-title-line {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      margin-bottom: 7px;
    }
    .danger-tag {
      min-width: 42px;
      min-height: 22px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(239,102,102,0.52);
      border-radius: 6px;
      background: rgba(127,29,29,0.32);
      color: #fecaca;
      font-size: 12px;
      font-weight: 900;
    }
    .task-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #fff7ed;
      font-size: 20px;
      font-weight: 950;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .chip {
      min-height: 23px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 7px;
      border: 1px solid rgba(148,163,184,0.25);
      border-radius: 999px;
      background: rgba(15,23,42,0.56);
      color: #cbd5e1;
      font-size: 12px;
      white-space: nowrap;
    }
    .chip.cost { border-color: rgba(251,113,133,0.48); color: #fecdd3; background: rgba(127,29,29,0.15); }
    .chip.challenge { border-color: rgba(245,158,11,0.52); color: #fde68a; background: rgba(120,53,15,0.16); }
    .chip.need { border-color: rgba(96,165,250,0.45); color: #bfdbfe; background: rgba(30,64,175,0.14); }
    .chip.reward { border-color: rgba(52,211,153,0.44); color: #bbf7d0; background: rgba(6,95,70,0.14); }
    .deadline {
      min-width: 116px;
      height: 56px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(239,102,102,0.72);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(127,29,29,0.65), rgba(45,12,16,0.86));
      text-align: center;
    }
    .deadline small {
      display: block;
      color: #fca5a5;
      font-size: 11px;
      font-weight: 800;
    }
    .deadline strong {
      color: #fee2e2;
      font-size: 19px;
      line-height: 1.1;
    }
    .dispatch-lab-builder {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr);
      gap: 10px;
      align-items: stretch;
    }
    .dispatch-lab-panel-title {
      color: var(--gold);
      font-weight: 900;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .selected-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .pool-card {
      min-height: 86px;
      border: 1px solid rgba(71,85,105,0.72);
      border-radius: 8px;
      background: rgba(8,13,23,0.58);
      padding: 8px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 7px;
      align-content: center;
    }
    .pool-card.empty {
      border-style: dashed;
      color: #7f8ca3;
      text-align: center;
      grid-template-columns: 1fr;
      place-items: center;
    }
    .pool-card strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #f8fafc;
      font-size: 13px;
    }
    .pool-card small {
      color: #9fb1ca;
      font-size: 11px;
    }
    .remove {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(148,163,184,0.26);
      border-radius: 6px;
      background: rgba(15,23,42,0.72);
      cursor: pointer;
    }
    .tool-grid {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .tool-card {
      min-height: 58px;
      border: 1px solid rgba(148,163,184,0.24);
      border-radius: 8px;
      background: rgba(8,13,23,0.58);
      padding: 8px;
      display: grid;
      gap: 3px;
      align-content: center;
      text-align: left;
      cursor: pointer;
    }
    .tool-card.on {
      border-color: rgba(212,168,83,0.78);
      background: rgba(120,53,15,0.26);
    }
    .tool-card strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .tool-card small {
      color: #9fb1ca;
      font-size: 11px;
    }
    .need-row {
      display: grid;
      gap: 5px;
      margin-bottom: 9px;
      font-size: 12px;
    }
    .need-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #cbd5e1;
    }
    .meter {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(30,41,59,0.92);
    }
    .meter span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #86efac);
    }
    .meter.deficit span {
      background: linear-gradient(90deg, #f97316, #facc15);
    }
    .risk-card {
      margin-top: 8px;
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 8px;
      background: rgba(5,10,17,0.42);
      padding: 9px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.5;
    }
    .dispatch-lab-actions {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }
    .primary {
      min-height: 42px;
      border: 1px solid rgba(212,168,83,0.72);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(161,98,7,0.88), rgba(92,52,10,0.92));
      color: #fff7ed;
      font-weight: 950;
      cursor: pointer;
    }
    .primary:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      border-color: rgba(148,163,184,0.3);
      background: rgba(30,41,59,0.74);
      color: #94a3b8;
    }
    .candidate-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .mode-toggle {
      display: inline-flex;
      border: 1px solid rgba(148,163,184,0.24);
      border-radius: 7px;
      overflow: hidden;
      background: rgba(15,23,42,0.56);
    }
    .mode-toggle button {
      min-width: 86px;
      min-height: 32px;
      border: 0;
      border-right: 1px solid rgba(148,163,184,0.16);
      background: transparent;
      color: #aab8cb;
      cursor: pointer;
      font-size: 12px;
      font-weight: 850;
    }
    .mode-toggle button:last-child { border-right: 0; }
    .mode-toggle button.on {
      background: rgba(212,168,83,0.22);
      color: #fde68a;
    }
    .mode-toggle.compact button {
      min-width: 72px;
    }
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(214px, 1fr));
      gap: 8px;
    }
    .staff-card {
      min-height: 198px;
      border: 1px solid rgba(79,104,141,0.65);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(17,28,46,0.9), rgba(10,16,27,0.92));
      padding: 8px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 7px;
      text-align: left;
      cursor: pointer;
    }
    .staff-card:hover {
      border-color: rgba(96,165,250,0.72);
      box-shadow: 0 0 0 1px rgba(96,165,250,0.12);
    }
    .staff-card.selected {
      border-color: rgba(212,168,83,0.86);
      background: linear-gradient(180deg, rgba(56,42,20,0.84), rgba(11,17,28,0.94));
    }
    .staff-card.busy {
      opacity: 0.55;
      filter: saturate(0.45);
    }
    .staff-top {
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
    }
    .portrait {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(148,163,184,0.28);
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: rgba(15,23,42,0.86);
      font-weight: 950;
      font-size: 18px;
    }
    .staff-name { min-width: 0; display: grid; gap: 2px; }
    .staff-name strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #f8fafc;
      font-size: 13px;
    }
    .staff-name small { color: #94a3b8; font-size: 11px; }
    .recommend {
      color: #fde68a;
      font-size: 11px;
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }
    .attr-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-height: 23px;
    }
    .attr-tag {
      min-height: 21px;
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border: 1px solid var(--attr-border);
      border-radius: 999px;
      background: var(--attr-bg);
      color: var(--attr-color);
      font-size: 11px;
      white-space: nowrap;
    }
    .dice-net {
      width: 126px;
      min-height: 90px;
      justify-self: center;
      display: grid;
      grid-template-columns: repeat(4, 28px);
      grid-template-rows: repeat(3, 26px);
      gap: 3px;
      place-content: center;
    }
    .face {
      display: grid;
      place-items: center;
      border: 1px solid rgba(71,85,105,0.72);
      border-radius: 5px;
      background: rgba(15,23,42,0.78);
      color: #93a4bb;
      font-size: 10px;
      line-height: 1.05;
      text-align: center;
    }
    .face.relevant {
      border-color: rgba(212,168,83,0.86);
      background: rgba(120,53,15,0.3);
      color: #fff7ed;
      box-shadow: 0 0 0 1px rgba(212,168,83,0.2), 0 0 10px rgba(212,168,83,0.14);
    }
    .face.blank {
      border-style: dashed;
      opacity: 0.62;
    }
    .face.pos-0 { grid-column: 2; grid-row: 1; }
    .face.pos-1 { grid-column: 1; grid-row: 2; }
    .face.pos-2 { grid-column: 2; grid-row: 2; }
    .face.pos-3 { grid-column: 3; grid-row: 2; }
    .face.pos-4 { grid-column: 4; grid-row: 2; }
    .face.pos-5 { grid-column: 2; grid-row: 3; }
    .staff-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 7px;
      color: #9fb1ca;
      font-size: 11px;
    }
    .gain { color: #bbf7d0; font-weight: 850; }
    .warn { color: #fecaca; font-weight: 850; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      min-width: 320px;
      min-height: 40px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border: 1px solid rgba(245,158,11,0.66);
      border-radius: 8px;
      background: rgba(31,21,8,0.96);
      color: #fde68a;
      font-size: 13px;
      font-weight: 850;
      z-index: 20;
    }
    .toast.show { display: flex; }
    @media (max-width: 960px) {
      .dispatch-lab-builder { grid-template-columns: 1fr; }
      .dispatch-lab-task { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="dispatch-lab-shell">
      <div class="dispatch-lab-top">
        <button class="nav-return" type="button">返回</button>
        <div>
          <h1>探索配置</h1>
          <p class="risk-reason">本页只验证候选角色排序标签；其它布局保持现有派遣页语法。</p>
        </div>
        <div class="status-pills" aria-label="全局状态">
          <span>公信 42</span>
          <span>诡名 38</span>
          <span>声望 45</span>
          <span>守序 48</span>
          <span>生理 22</span>
        </div>
      </div>

      <section class="dispatch-lab-task" aria-labelledby="taskName">
        <div>
          <div class="task-title-line">
            <span class="danger-tag">突发</span>
            <h2 class="task-title" id="taskName">雷达异常光点</h2>
          </div>
          <div class="tags" id="taskTags"></div>
        </div>
        <div class="deadline"><div><small>截稿关闭</small><strong>剩余 3天</strong></div></div>
      </section>

      <div class="dispatch-lab-builder">
        <section class="dispatch-lab-panel" aria-labelledby="poolTitle">
          <div class="dispatch-lab-panel-title">
            <span id="poolTitle">本次骰池</span>
            <span class="risk-reason" id="poolCount">已选 0/3 人</span>
          </div>
          <div class="selected-grid" id="selectedGrid"></div>
          <div class="dispatch-lab-panel-title" style="margin-top:10px;">
            <span>追加骰</span>
            <span class="risk-reason">固定三槽 · 道具不占人数</span>
          </div>
          <div class="tool-grid" id="toolGrid"></div>
        </section>

        <aside class="dispatch-lab-panel" aria-label="需求覆盖">
          <div class="dispatch-lab-panel-title">
            <span>需求覆盖</span>
            <span class="chip challenge" id="riskBadge">风险：高 · 0%</span>
          </div>
          <div id="needRows"></div>
          <div class="risk-card" id="riskCopy">先选择至少 1 名角色。</div>
          <div class="dispatch-lab-actions">
            <button class="primary" id="startBtn" type="button" disabled>开始调查（2天后判定）</button>
          </div>
        </aside>
      </div>

      <section class="dispatch-lab-panel">
        <div class="candidate-head">
          <div class="dispatch-lab-panel-title" style="margin:0;">
            <span>候选角色</span>
            <span class="risk-reason">排序只在切换标签时变化，选中不改位置</span>
          </div>
          <span class="mode-toggle" id="sortToggle">
            <button type="button" data-sort="fit" class="on">任务贡献</button>
            <button type="button" data-sort="chance">达标提升</button>
            <button type="button" data-sort="idle">未派遣优先</button>
          </span>
        </div>
        <div class="staff-grid" id="staffGrid"></div>
      </section>
    </div>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    const task = {
      needs: { "探索": 2, "生存": 1, "胆识": 1 },
      target: 3,
      maxStaff: 3,
    };
    const attrStyle = {
      "探索": ["#38c7e8", "rgba(56,199,232,0.16)", "rgba(56,199,232,0.52)"],
      "生存": ["#40d37b", "rgba(64,211,123,0.15)", "rgba(64,211,123,0.52)"],
      "胆识": ["#ef6666", "rgba(239,102,102,0.14)", "rgba(239,102,102,0.52)"],
      "人脉": ["#34d399", "rgba(52,211,153,0.14)", "rgba(52,211,153,0.5)"],
      "洞察": ["#60a5fa", "rgba(96,165,250,0.14)", "rgba(96,165,250,0.5)"],
      "理性": ["#a78bfa", "rgba(167,139,250,0.14)", "rgba(167,139,250,0.5)"],
      "造势": ["#f59e0b", "rgba(245,158,11,0.14)", "rgba(245,158,11,0.48)"],
      "空": ["#64748b", "rgba(100,116,139,0.12)", "rgba(100,116,139,0.35)"],
    };
    const staff = [
      { id: "indiana", name: "印第安纳穷死", icon: "印", tags: ["探索", "胆识"], busy: false, faces: [["探索", 2], ["胆识", 2], ["探索", 1], ["生存", 1], ["空", 0], ["胆识", 1]] },
      { id: "fake", name: "伪人", icon: "伪", tags: ["人脉", "探索"], busy: false, faces: [["人脉", 2], ["探索", 2], ["洞察", 1], ["生存", 1], ["空", 0], ["探索", 1]] },
      { id: "aileen", name: "艾灵", icon: "艾", tags: ["理性", "洞察"], busy: false, faces: [["理性", 2], ["洞察", 2], ["探索", 1], ["生存", 1], ["空", 0], ["理性", 1]] },
      { id: "mary", name: "玛丽格温", icon: "玛", tags: ["生存", "探索"], busy: false, faces: [["生存", 2], ["探索", 1], ["胆识", 1], ["洞察", 1], ["空", 0], ["生存", 1]] },
      { id: "clock", name: "末日时钟", icon: "钟", tags: ["洞察", "理性"], busy: false, faces: [["洞察", 2], ["理性", 2], ["洞察", 1], ["人脉", 1], ["空", 0], ["生存", 1]] },
      { id: "scientist", name: "火鸡科学家", icon: "科", tags: ["理性", "洞察"], busy: false, faces: [["理性", 3], ["洞察", 2], ["理性", 1], ["造势", 1], ["空", 0], ["洞察", 1]] },
      { id: "editor", name: "主编", icon: "主", tags: ["人脉", "洞察"], busy: true, faces: [["人脉", 2], ["洞察", 2], ["造势", 1], ["胆识", 1], ["空", 0], ["人脉", 1]] },
      { id: "guide", name: "娜娜", icon: "娜", tags: ["探索", "生存"], busy: false, faces: [["探索", 1], ["生存", 2], ["探索", 1], ["生存", 1], ["胆识", 1], ["空", 0]] },
    ];
    const tools = [
      { id: "night", name: "夜视相机组", detail: "探索+1 / 探索+1", faces: [["探索", 1], ["探索", 1], ["空", 0], ["空", 0], ["空", 0], ["空", 0]] },
      { id: "hotline", name: "匿名热线录音", detail: "人脉+2 / 洞察+1", faces: [["人脉", 2], ["洞察", 1], ["空", 0], ["空", 0], ["空", 0], ["空", 0]] },
      { id: "aid", name: "急救药剂", detail: "生存+1 / 胆识+1", faces: [["生存", 1], ["胆识", 1], ["空", 0], ["空", 0], ["空", 0], ["空", 0]] },
    ];
    const state = {
      selected: [],
      selectedTools: new Set(["night"]),
      sort: "fit",
      messageTimer: 0,
    };
    const $ = (selector) => document.querySelector(selector);
    const needs = Object.keys(task.needs);

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function attrVars(attr) {
      const [color, bg, border] = attrStyle[attr] || attrStyle["空"];
      return `--attr-color:${color};--attr-bg:${bg};--attr-border:${border}`;
    }
    function isRelevant(face) {
      return face[0] in task.needs;
    }
    function relevantValue(entity) {
      return entity.faces.reduce((sum, face) => sum + (isRelevant(face) ? face[1] : 0), 0);
    }
    function relevantFaces(entity) {
      return entity.faces.filter((face) => isRelevant(face) && face[1] > 0).length;
    }
    function selectedToolList() {
      return tools.filter((tool) => state.selectedTools.has(tool.id));
    }
    function statsFor(ids, toolIds) {
      const totals = Object.fromEntries(needs.map((key) => [key, 0]));
      const dice = [];
      ids.forEach((id) => {
        const member = staff.find((item) => item.id === id);
        if (!member) return;
        dice.push(member.faces);
        member.faces.forEach(([attr, value]) => {
          if (attr in totals) totals[attr] += value;
        });
      });
      tools.filter((tool) => toolIds.has(tool.id)).forEach((tool) => {
        dice.push(tool.faces);
        tool.faces.forEach(([attr, value]) => {
          if (attr in totals) totals[attr] += value;
        });
      });
      const chance = successChance(dice);
      const deficits = needs.filter((key) => totals[key] < task.needs[key]);
      return { totals, deficits, chance };
    }
    function successChance(dice) {
      if (!dice.length) return 0;
      let total = 0;
      let pass = 0;
      function walk(index, score) {
        if (index >= dice.length) {
          total += 1;
          if (score >= task.target) pass += 1;
          return;
        }
        dice[index].forEach(([attr, value]) => walk(index + 1, score + ((attr in task.needs) ? value : 0)));
      }
      walk(0, 0);
      return total ? pass / total : 0;
    }
    function renderTags() {
      $("#taskTags").innerHTML = [
        `<span class="chip cost">耗时 2天</span>`,
        `<span class="chip challenge">挑战：对手骰2</span>`,
        `<span class="chip reward">奖励：常驻线索</span>`,
        ...needs.map((key) => `<span class="chip need">条件：${escapeHtml(key)}${task.needs[key]}</span>`),
      ].join("");
    }
    function renderPool() {
      const selected = state.selected.map((id) => staff.find((item) => item.id === id)).filter(Boolean);
      $("#poolCount").textContent = `已选 ${selected.length}/${task.maxStaff} 人`;
      $("#selectedGrid").innerHTML = Array.from({ length: task.maxStaff }, (_, index) => {
        const member = selected[index];
        if (!member) return `<div class="pool-card empty">空槽 ${index + 1}<br><small>从下方角色加入</small></div>`;
        return `<div class="pool-card">
          <div><strong>${escapeHtml(member.name)}</strong><small>${escapeHtml(summaryFor(member))}</small></div>
          <button class="remove" type="button" data-remove="${escapeHtml(member.id)}" aria-label="撤下 ${escapeHtml(member.name)}">×</button>
        </div>`;
      }).join("");
      $("#toolGrid").innerHTML = tools.map((tool) => {
        const on = state.selectedTools.has(tool.id);
        return `<button type="button" class="tool-card${on ? " on" : ""}" data-tool="${escapeHtml(tool.id)}">
          <strong>${escapeHtml(tool.name)}</strong>
          <small>${escapeHtml(tool.detail)} · ${on ? "已装入" : "可装入"}</small>
        </button>`;
      }).join("");
    }
    function summaryFor(member) {
      return needs.map((key) => {
        const value = member.faces.reduce((sum, face) => sum + (face[0] === key ? face[1] : 0), 0);
        return value ? `${key}+${value}` : "";
      }).filter(Boolean).join(" / ") || "无直接需求面";
    }
    function renderRunBlock() {
      const stats = statsFor(state.selected, state.selectedTools);
      $("#needRows").innerHTML = needs.map((key) => {
        const target = task.needs[key];
        const value = stats.totals[key] || 0;
        const pct = Math.min(100, Math.round((value / target) * 100));
        return `<div class="need-row">
          <div class="need-line"><span>${escapeHtml(key)}</span><span>${value}/${target}${value >= target ? " · 已覆盖" : ` · 缺 ${target - value}`}</span></div>
          <div class="meter${value < target ? " deficit" : ""}"><span style="width:${pct}%"></span></div>
        </div>`;
      }).join("");
      const chance = Math.round(stats.chance * 100);
      const label = chance >= 65 ? "低" : chance >= 40 ? "中" : "高";
      $("#riskBadge").textContent = `风险：${label} · ${chance}%`;
      const canStart = state.selected.length > 0 && stats.deficits.length === 0;
      $("#riskCopy").textContent = canStart
        ? `可出发：${state.selected.length} 人 + ${selectedToolList().length} 件支援，预计达标率 ${chance}%。`
        : state.selected.length === 0
          ? "先选择至少 1 名角色。"
          : `尚不能开始：${stats.deficits.join(" / ")} 仍未覆盖。`;
      $("#startBtn").disabled = !canStart;
    }
    function sortedStaff() {
      const order = Object.fromEntries(staff.map((item, index) => [item.id, index]));
      const base = statsFor(state.selected, state.selectedTools);
      return staff.slice().sort((a, b) => {
        if (state.sort === "idle" && a.busy !== b.busy) return a.busy ? 1 : -1;
        if (state.sort === "chance") {
          const aGain = chanceGain(a, base);
          const bGain = chanceGain(b, base);
          if (aGain !== bGain) return bGain - aGain;
        } else {
          const value = relevantValue(b) - relevantValue(a);
          if (value) return value;
          const faces = relevantFaces(b) - relevantFaces(a);
          if (faces) return faces;
        }
        return order[a.id] - order[b.id];
      });
    }
    function chanceGain(member, base) {
      if (member.busy || state.selected.includes(member.id) || state.selected.length >= task.maxStaff) return -1;
      return statsFor([...state.selected, member.id], state.selectedTools).chance - base.chance;
    }
    function renderStaff() {
      const base = statsFor(state.selected, state.selectedTools);
      $("#staffGrid").innerHTML = sortedStaff().map((member) => {
        const selected = state.selected.includes(member.id);
        const gain = chanceGain(member, base);
        const gainText = member.busy ? "执行中" : selected ? "已在骰池" : state.selected.length >= task.maxStaff ? "人数已满" : `${gain >= 0 ? "+" : ""}${Math.round(gain * 100)}%`;
        return `<button type="button" class="staff-card${selected ? " selected" : ""}${member.busy ? " busy" : ""}" data-staff="${escapeHtml(member.id)}">
          <div class="staff-top">
            <div class="portrait">${escapeHtml(member.icon)}</div>
            <div class="staff-name"><strong>${escapeHtml(member.name)}</strong><small>相关面 ${relevantFaces(member)}/6 · 贡献 ${relevantValue(member)}</small></div>
            <div class="recommend">${selected ? "已选" : "推荐"}<br>${"★".repeat(Math.max(1, Math.min(3, relevantFaces(member))))}</div>
          </div>
          <div class="attr-tags">${member.tags.map((tag) => `<span class="attr-tag" style="${attrVars(tag)}">${escapeHtml(tag)}</span>`).join("")}</div>
          ${diceNet(member.faces)}
          <div class="staff-foot"><span>${member.busy ? "已被其它任务占用" : selected ? "点击撤下" : "点击加入骰池"}</span><span class="${member.busy || gain < 0 ? "warn" : "gain"}">${escapeHtml(gainText)}</span></div>
        </button>`;
      }).join("");
    }
    function diceNet(faces) {
      return `<div class="dice-net">${faces.map(([attr, value], index) => {
        const label = attr === "空" ? "空" : `${attr}${value}`;
        const classes = ["face", `pos-${index}`, attr === "空" ? "blank" : "", attr in task.needs ? "relevant" : ""].filter(Boolean).join(" ");
        return `<span class="${classes}" style="${attrVars(attr)}">${escapeHtml(label)}</span>`;
      }).join("")}</div>`;
    }
    function showToast(text) {
      const toast = $("#toast");
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(state.messageTimer);
      state.messageTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }
    function toggleStaff(id) {
      const member = staff.find((item) => item.id === id);
      if (!member || member.busy) {
        showToast("该角色正在执行其他任务，不能加入本次骰池。");
        return;
      }
      if (state.selected.includes(id)) state.selected = state.selected.filter((item) => item !== id);
      else if (state.selected.length >= task.maxStaff) showToast(`本任务最多派遣 ${task.maxStaff} 人，请先手动撤下一名已选角色。`);
      else state.selected.push(id);
      render();
    }
    function render() {
      renderTags();
      renderPool();
      renderRunBlock();
      renderStaff();
    }
    document.addEventListener("click", (event) => {
      const remove = event.target.closest("[data-remove]");
      if (remove) {
        event.stopPropagation();
        toggleStaff(remove.dataset.remove);
        return;
      }
      const tool = event.target.closest("[data-tool]");
      if (tool) {
        const id = tool.dataset.tool;
        if (state.selectedTools.has(id)) state.selectedTools.delete(id);
        else state.selectedTools.add(id);
        render();
        return;
      }
      const staffCard = event.target.closest("[data-staff]");
      if (staffCard) {
        toggleStaff(staffCard.dataset.staff);
        return;
      }
      const sort = event.target.closest("[data-sort]");
      if (sort) {
        state.sort = sort.dataset.sort;
        document.querySelectorAll("[data-sort]").forEach((btn) => btn.classList.toggle("on", btn.dataset.sort === state.sort));
        renderStaff();
      }
    });
    $("#startBtn").addEventListener("click", () => showToast("实验页只验证排序标签，不进入真实结算。"));
    render();
  </script>
</body>
</html>
