    <rect x="25" y="38" width="526" height="88" fill="url(#dots)" opacity=".55"/>
    <text x="72" y="76" class="ink" font-size="44" paint-order="stroke" stroke="#071012" stroke-width="8">世界未解之谜周刊</text>
    <text x="72" y="76" font-family="Microsoft YaHei, Noto Sans SC, system-ui, sans-serif" font-size="44" font-weight="900" fill="#20c3d7" opacity=".58" transform="translate(4 -3)">世界未解之谜周刊</text>
    <text x="72" y="76" font-family="Microsoft YaHei, Noto Sans SC, system-ui, sans-serif" font-size="44" font-weight="900" fill="#ed382d" opacity=".58" transform="translate(-4 4)">世界未解之谜周刊</text>
