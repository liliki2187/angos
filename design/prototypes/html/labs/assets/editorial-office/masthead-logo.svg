<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 210" role="img" aria-labelledby="title desc">
  <title id="title">世界未解之谜周刊刊头</title>
  <desc id="desc">红蓝错印的周刊招牌，带主编室标记和印刷定位符。</desc>
  <defs>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#20c3d7" opacity=".28"/>
      <circle cx="7" cy="7" r="1.1" fill="#ed382d" opacity=".22"/>
    </pattern>
    <filter id="rough-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="12" stdDeviation="0" flood-color="#ed382d" flood-opacity=".28"/>
      <feDropShadow dx="18" dy="20" stdDeviation="0" flood-color="#20c3d7" flood-opacity=".2"/>
    </filter>
  </defs>
  <style>
    .paper { fill: #142022; stroke: #fff1c9; stroke-width: 5; }
    .edge { fill: #ed382d; }
    .cyan { fill: #20c3d7; }
    .ink { fill: #fff1c9; font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; font-weight: 900; }
    .small { fill: #d7cfb7; font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; font-weight: 800; letter-spacing: .6px; }
    .black { fill: #05080b; }
  </style>
  <g transform="translate(26 22) rotate(-1.6 286 82)" filter="url(#rough-shadow)">
