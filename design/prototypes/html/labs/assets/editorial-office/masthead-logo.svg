    <path d="M450 94h86v14h-86zm-410 0h34v14H40z" class="black" opacity=".72"/>
    <path d="M478 42h18v18h-18zm25 0h18v18h-18zm25 0h18v18h-18z" class="black" opacity=".74"/>
