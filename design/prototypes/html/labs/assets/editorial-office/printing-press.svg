<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" role="img" aria-labelledby="title desc">
  <title id="title">印刷待命装置</title>
  <desc id="desc">桌边小型周刊印刷机，有滚筒、纸卷、待印样张和红色待命灯。</desc>
  <defs>
    <pattern id="roller-lines" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 0h7v18H0z" fill="#ffffff" opacity=".09"/>
    </pattern>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="9" flood-color="#000" flood-opacity=".48"/>
    </filter>
  </defs>
  <style>
    .ui { font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; }
    .cream { fill: #fff1c9; }
    .muted { fill: #cbbf9f; }
    .red { fill: #ed382d; }
    .cyan { fill: #20c3d7; }
    .stroke { stroke: #fff1c9; stroke-width: 3; opacity: .34; }
  </style>
  <g filter="url(#drop)">
    <path d="M66 92h420l34 52v146H44V144Z" fill="#101719" stroke="#3f4a4d" stroke-width="5"/>
    <path d="M66 92h420l34 52H44Z" fill="#20292c"/>
    <path d="M88 116h168v34H88z" fill="#05080b" opacity=".76"/>
    <text x="104" y="138" class="ui cream" font-size="20" font-weight="900">印刷机待命</text>
    <circle cx="456" cy="132" r="13" class="red"/>
    <circle cx="456" cy="132" r="23" fill="#ed382d" opacity=".18"/>
    <text x="336" y="138" class="ui muted" font-size="15" font-weight="800">未定头版</text>

    <rect x="80" y="170" width="400" height="48" rx="24" fill="#090d10" stroke="#6d7578" stroke-width="4"/>
    <rect x="95" y="181" width="370" height="26" rx="13" fill="#23292e"/>
    <rect x="95" y="181" width="370" height="26" rx="13" fill="url(#roller-lines)"/>

    <rect x="80" y="238" width="400" height="48" rx="24" fill="#090d10" stroke="#6d7578" stroke-width="4"/>
    <rect x="95" y="249" width="370" height="26" rx="13" fill="#22282d"/>
    <rect x="95" y="249" width="370" height="26" rx="13" fill="url(#roller-lines)"/>

    <g transform="translate(154 194) rotate(-3)">
      <path d="M0 0h278v74H0z" fill="#ead9ac" stroke="#111" stroke-width="4"/>
      <path d="M0 0h66v74H0z" class="red"/>
      <path d="M80 18h190M80 34h178M80 50h184" stroke="#111" stroke-width="5" opacity=".62"/>
      <text x="13" y="27" class="ui cream" font-size="13" font-weight="900">ISSUE</text>
      <text x="13" y="48" class="ui cream" font-size="22" font-weight="900">001</text>
    </g>

    <path d="M30 290h506v22H30z" fill="#05080b"/>
    <path d="M80 290v24m400-24v24" class="stroke"/>
    <path d="M112 70h86l22 22H86Z" class="cyan" opacity=".82"/>
    <path d="M372 70h74l22 22H350Z" class="red" opacity=".82"/>
  </g>
</svg>
