<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" role="img" aria-labelledby="title desc">
  <title id="title">编辑部本周选题墙</title>
  <desc id="desc">带截稿标签、剪报、便签、红线和主编批注的编辑部选题墙。</desc>
  <defs>
    <pattern id="grain" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 0h12v12H0z" fill="#17140f"/>
      <circle cx="2" cy="3" r="1" fill="#fff1c9" opacity=".08"/>
      <circle cx="9" cy="8" r="1.2" fill="#20c3d7" opacity=".07"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="8" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>
  <style>
    .ui { font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; }
    .label { fill: #fff1c9; font-weight: 900; }
    .small { fill: #d9d0b8; font-weight: 800; }
    .paper { fill: #ead9ac; stroke: #16120c; stroke-width: 2; }
    .paper2 { fill: #f4e7bd; stroke: #16120c; stroke-width: 2; }
    .red { fill: #ed382d; }
    .cyan { fill: #20c3d7; }
    .inkline { stroke: #101010; stroke-width: 4; stroke-linecap: round; opacity: .85; }
    .thread { stroke: #ed382d; stroke-width: 4; stroke-linecap: round; opacity: .9; }
  </style>
  <g filter="url(#shadow)">
    <path d="M22 26 568 10l14 392L38 420Z" fill="#3a3325"/>
    <path d="M38 42 552 26l12 358L54 402Z" fill="url(#grain)" stroke="#b0a38a" stroke-width="5"/>
    <path d="M42 48 548 33l2 42L44 90Z" fill="#06090a" opacity=".62"/>
    <text x="62" y="73" class="ui label" font-size="26">本周选题墙</text>
    <text x="388" y="70" class="ui small" font-size="15">截稿前 6 天 · 头版候选</text>

    <g transform="translate(68 112) rotate(-4)">
      <path d="M0 0h154v88H0z" class="paper2"/>
      <path d="M0 0h154v20H0z" class="cyan"/>
      <text x="12" y="44" class="ui" font-size="22" font-weight="900" fill="#0b0b0b">地铁终点站</text>
      <text x="12" y="69" class="ui" font-size="20" font-weight="900" fill="#0b0b0b">多出一站</text>
      <text x="96" y="16" class="ui" font-size="13" font-weight="900" fill="#071012">可派遣</text>
    </g>
    <g transform="translate(352 98) rotate(5)">
      <path d="M0 0h154v90H0z" class="paper"/>
      <path d="M0 0h154v22H0z" class="red"/>
      <text x="13" y="45" class="ui" font-size="20" font-weight="900" fill="#0b0b0b">第二个月亮</text>
      <text x="13" y="70" class="ui" font-size="19" font-weight="900" fill="#0b0b0b">读者连拍</text>
      <text x="98" y="17" class="ui" font-size="13" font-weight="900" fill="#fff1c9">头版?</text>
    </g>
    <g transform="translate(220 254) rotate(-1)">
      <path d="M0 0h160v80H0z" class="paper2"/>
      <text x="15" y="33" class="ui" font-size="21" font-weight="900" fill="#0b0b0b">天文台收到</text>
      <text x="15" y="58" class="ui" font-size="21" font-weight="900" fill="#0b0b0b">“回信”</text>
      <path d="M116 8h42v17h-42z" class="cyan" opacity=".85"/>
    </g>
    <g transform="translate(72 276) rotate(3)">
      <path d="M0 0h120v64H0z" fill="#11191b" stroke="#20c3d7" stroke-width="3"/>
      <text x="12" y="27" class="ui small" font-size="15">版位：内页</text>
      <text x="12" y="49" class="ui small" font-size="15">来源：投稿</text>
    </g>
    <g transform="translate(404 268) rotate(3)">
      <path d="M0 0h118v64H0z" fill="#11191b" stroke="#ed382d" stroke-width="3"/>
      <text x="11" y="27" class="ui small" font-size="15">科学会盯上</text>
      <text x="11" y="49" class="ui small" font-size="15">标题需克制</text>
    </g>

    <path d="M144 155 426 144" class="thread"/>
    <path d="M420 148 304 292" class="thread"/>
    <path d="M144 155 300 292" class="thread"/>
    <path d="M250 102c-24 6-46 19-62 39" fill="none" stroke="#fff1c9" stroke-width="3" opacity=".38"/>
    <path d="M184 132 210 139 190 157" fill="none" stroke="#fff1c9" stroke-width="3" opacity=".38"/>
    <circle cx="144" cy="155" r="10" class="red"/>
    <circle cx="426" cy="144" r="10" class="red"/>
    <circle cx="300" cy="292" r="10" class="red"/>
    <circle cx="144" cy="155" r="4" fill="#fff1c9"/>
    <circle cx="426" cy="144" r="4" fill="#fff1c9"/>
    <circle cx="300" cy="292" r="4" fill="#fff1c9"/>

    <path d="M438 210c20 5 34 17 39 33" fill="none" stroke="#ed382d" stroke-width="5"/>
    <path d="M478 244l-18-8 10-15" fill="none" stroke="#ed382d" stroke-width="5"/>
    <text x="370" y="232" class="ui" font-size="18" font-weight="900" fill="#ed382d" transform="rotate(-5 370 232)">主编圈头版</text>
  </g>
</svg>
