<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="title desc">
  <title id="title">主编编辑桌</title>
  <desc id="desc">主编桌上摊着本期样刊、红笔、批注、照片、信件、印章和截稿便签。</desc>
  <defs>
    <pattern id="wood" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#1b140e"/>
      <path d="M0 16h64M0 48h64" stroke="#fff1c9" stroke-width="2" opacity=".06"/>
      <path d="M10 0v64M42 0v64" stroke="#fff1c9" stroke-width="2" opacity=".05"/>
    </pattern>
    <filter id="desk-shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#000" flood-opacity=".5"/>
    </filter>
  </defs>
  <style>
    .ui { font-family: "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif; }
    .paper { fill: #ead9ac; stroke: #111; stroke-width: 4; }
    .paper2 { fill: #f5e8c1; stroke: #111; stroke-width: 3; }
    .red { fill: #ed382d; }
    .cyan { fill: #20c3d7; }
    .cream { fill: #fff1c9; }
    .inkline { stroke: #111; stroke-width: 5; stroke-linecap: round; opacity: .82; }
    .redline { stroke: #ed382d; stroke-width: 6; stroke-linecap: round; fill: none; }
  </style>
  <g filter="url(#desk-shadow)">
    <path d="M130 96 800 78l70 352H40Z" fill="url(#wood)" stroke="#4b4035" stroke-width="5"/>
    <path d="M130 96 800 78l11 54-700 21Z" fill="#fff1c9" opacity=".08"/>
    <path d="M96 300h784v80H64Z" fill="#0b0a08" opacity=".42"/>

    <g transform="translate(208 128) rotate(-5)">
      <path d="M18 18h346v232H18z" fill="#8a1e1a" opacity=".55"/>
      <path d="M8 8h346v232H8z" fill="#155b66" opacity=".66"/>
      <path d="M0 0h346v232H0z" class="paper"/>
      <path d="M0 0h346v40H0z" class="red"/>
      <path d="M0 40h82v192H0z" class="cyan"/>
      <text x="17" y="28" class="ui cream" font-size="17" font-weight="900">ISSUE 001 · 本期头版草样</text>
      <text x="102" y="82" class="ui" font-size="34" font-weight="900" fill="#0b0b0b">纽约上空的</text>
      <text x="102" y="122" class="ui" font-size="34" font-weight="900" fill="#0b0b0b">第二个月亮</text>
      <path d="M26 148h170M26 168h146M26 188h164M26 208h130" class="inkline"/>
      <rect x="222" y="134" width="100" height="74" fill="#101314" stroke="#111" stroke-width="5"/>
      <circle cx="271" cy="170" r="15" class="red"/>
      <path d="M224 134h98v20h-98z" fill="#fff1c9" opacity=".1"/>
    </g>

    <g transform="translate(544 168) rotate(5)">
      <rect x="0" y="0" width="152" height="94" rx="8" fill="#3a1614" stroke="#ed382d" stroke-width="4"/>
      <text x="28" y="36" class="ui cream" font-size="24" font-weight="900">主编</text>
      <text x="28" y="66" class="ui cream" font-size="24" font-weight="900">终审</text>
      <path d="M18 16h116v62H18z" fill="none" stroke="#fff1c9" stroke-width="2" opacity=".28"/>
    </g>

    <g transform="translate(646 112) rotate(2)">
      <path d="M0 0h204v44H0z" fill="#2e2c25" stroke="#111" stroke-width="3"/>
      <path d="M0 0h7v44H0z" fill="#f1b83a"/>
      <text x="18" y="28" class="ui cream" font-size="17" font-weight="900">截稿：头版标题未定</text>
      <path d="M14 64h196v44H14z" fill="#2e2c25" stroke="#111" stroke-width="3"/>
      <path d="M14 64h7v44h-7z" class="cyan"/>
      <text x="32" y="92" class="ui cream" font-size="17" font-weight="900">解释：仪器误差 / 民俗</text>
      <path d="M26 128h188v44H26z" fill="#2e2c25" stroke="#111" stroke-width="3"/>
      <path d="M26 128h7v44h-7z" class="red"/>
      <text x="45" y="156" class="ui cream" font-size="17" font-weight="900">科学会已盯上</text>
    </g>

    <g transform="translate(115 140) rotate(-12)">
      <path d="M0 0h104v78H0z" class="paper2"/>
      <path d="M18 20h68M18 38h56M18 56h64" class="inkline"/>
      <path d="M68 -10h26v24H68z" class="cyan"/>
    </g>

    <g transform="translate(92 246) rotate(8)">
      <path d="M0 0h142v58H0z" class="paper2"/>
      <text x="14" y="35" class="ui" font-size="20" font-weight="900" fill="#111">读者来信摘录</text>
      <path d="M0 0h18v58H0z" class="red"/>
    </g>

    <path d="M614 288c74-24 118-21 168 10" class="redline"/>
    <path d="M760 296l-22-17 29-8" class="redline"/>
    <g transform="translate(624 286) rotate(-18)">
      <rect x="0" y="0" width="170" height="16" rx="8" class="red"/>
      <rect x="126" y="-4" width="36" height="24" rx="4" fill="#111"/>
    </g>

    <circle cx="168" cy="318" r="30" fill="none" stroke="#8c7a5c" stroke-width="6" opacity=".44"/>
    <circle cx="168" cy="318" r="18" fill="none" stroke="#8c7a5c" stroke-width="5" opacity=".38"/>
    <path d="M44 392h820" stroke="#fff1c9" stroke-width="3" opacity=".08"/>
  </g>
</svg>
