name: Deploy Prototype to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 与 prototype-pages.yml 共用同一组，避免两次同时 deploy-pages 导致失败
concurrency:
  group: "github-pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static artifact
        run: |
          mkdir -p dist
          cp "design/prototypes/html/full-chain-demo/world-mysteries-full-chain.html" dist/index.html
          cp "design/prototypes/html/full-chain-demo/world-mysteries-full-chain.html" dist/world-mysteries-full-chain.html
          cp "design/prototypes/html/full-chain-demo/world-mysteries-full-chain.js" dist/world-mysteries-full-chain.js
          cp "design/prototypes/html/full-chain-demo/world-mysteries-full-chain-head.htm" dist/world-mysteries-full-chain-head.htm
          cp "design/prototypes/html/full-chain-demo/world-mysteries-explore-dice.html" dist/world-mysteries-explore-dice.html
          cp "design/prototypes/html/full-chain-demo/newspaper-fill-lab.html" dist/newspaper-fill-lab.html
          cp -R "design/prototypes/html/full-chain-demo/Assets" dist/Assets
          cp "README.md" dist/README.md
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
