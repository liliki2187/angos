name: Prototype Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "design/htmls/**"
      - "design/generated-settlement-reference/2026-03-18/**"
      - ".github/workflows/prototype-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: prototype-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Prototype Hub
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/design/htmls
          mkdir -p site/design/generated-settlement-reference/2026-03-18
          cp index.html site/index.html
          cp design/htmls/*.html site/design/htmls/
          cp design/generated-settlement-reference/2026-03-18/*.html site/design/generated-settlement-reference/2026-03-18/
          cp design/generated-settlement-reference/2026-03-18/*.css site/design/generated-settlement-reference/2026-03-18/
          cp design/generated-settlement-reference/2026-03-18/*.js site/design/generated-settlement-reference/2026-03-18/
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
