name: Prototype Pages

# 仅手动运行：与 pages.yml（全链条 index）分开，避免同一次 push 两次 deploy-pages 抢锁失败。
# 需要发布「原型导航站 + design/htmls」时在 Actions 里选本 workflow → Run workflow。
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 与 pages.yml 共用同一组，避免并发部署 GitHub Pages 失败
concurrency:
  group: "github-pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Prototype Hub
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble static site
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p site/design/htmls
          mkdir -p site/design/generated-settlement-reference/2026-03-18
          cp index.html site/index.html
          for f in design/htmls/*.html; do cp "$f" site/design/htmls/; done
          for f in design/generated-settlement-reference/2026-03-18/*.html; do cp "$f" site/design/generated-settlement-reference/2026-03-18/; done
          for f in design/generated-settlement-reference/2026-03-18/*.css; do cp "$f" site/design/generated-settlement-reference/2026-03-18/; done
          for f in design/generated-settlement-reference/2026-03-18/*.js; do cp "$f" site/design/generated-settlement-reference/2026-03-18/; done
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
