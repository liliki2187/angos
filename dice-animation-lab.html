<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>骰子动画实验场</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2a;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #22c55e;
      --miss: #94a3b8;
      --void: #cbd5e1;
      --roll: #60a5fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 20px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(ellipse at top, #17223a, var(--bg));
      color: var(--text);
    }
    .wrap { max-width: 1160px; margin: 0 auto; display: grid; grid-template-columns: 360px 1fr; gap: 14px; }
    @media (max-width: 980px) { .wrap { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    h1 { margin: 0 0 10px; font-size: 20px; }
    h2 { margin: 0 0 8px; font-size: 15px; color: #fbbf24; }
    .grid { display: grid; grid-template-columns: 1fr 86px; gap: 8px; align-items: center; margin-bottom: 8px; }
    label { font-size: 13px; color: var(--muted); }
    input, select, button {
      border-radius: 8px; border: 1px solid #475569;
      background: #0f172a; color: var(--text);
      padding: 7px 9px; font-size: 13px;
    }
    button { cursor: pointer; }
    button.primary { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .hint { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .phase {
      display: inline-flex; gap: 8px; align-items: center; font-size: 13px;
      color: #93c5fd; margin-bottom: 8px;
    }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #1e3a8a; border-top-color: #60a5fa;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pool { margin-bottom: 10px; }
    .pool h3 { margin: 0 0 6px; font-size: 14px; color: #fcd34d; }
    .row { display: flex; flex-wrap: wrap; gap: 6px; min-height: 38px; }
    .die {
      width: 32px; height: 32px;
      border-radius: 8px; border: 1px solid var(--border);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      background: #0b1220;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .die.rolling {
      color: var(--roll); border-color: #60a5fa;
      background: linear-gradient(160deg, #0b1220, #10223d);
      animation: rolling 0.22s linear infinite;
      box-shadow: 0 0 0 1px rgba(96,165,250,0.2) inset, 0 0 12px rgba(59,130,246,0.35);
    }
    .die.hit { color: var(--ok); border-color: var(--ok); box-shadow: 0 0 0 1px rgba(34,197,94,0.2) inset, 0 0 10px rgba(34,197,94,0.28); }
    .die.miss { color: #ef4444; border-color: #ef4444; box-shadow: 0 0 0 1px rgba(239,68,68,0.18) inset, 0 0 10px rgba(239,68,68,0.2); }
    .die.void { color: var(--void); border-style: dashed; text-decoration: line-through; opacity: 0.8; }
    .die.pop { animation: pop 0.22s ease-out; }
    @keyframes rolling {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      25% { transform: translateY(-2px) rotate(7deg) scale(1.08); }
      50% { transform: translateY(1px) rotate(-6deg) scale(0.98); }
      75% { transform: translateY(-1px) rotate(5deg) scale(1.06); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }
    @keyframes pop {
      0% { transform: scale(0.85); filter: brightness(1.25); }
      65% { transform: scale(1.12); filter: brightness(1.08); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .log {
      max-height: 180px; overflow: auto; border: 1px solid var(--border); border-radius: 8px;
      background: #0b1220; padding: 8px; font-size: 12px; color: var(--muted);
    }
    .log p { margin: 0 0 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1>骰子动画实验场</h1>
      <h2>参数控制</h2>

      <div class="grid"><label>调查池骰子数 A</label><input id="nA" type="number" min="0" max="40" value="18" /></div>
      <div class="grid"><label>现场池骰子数 B</label><input id="nB" type="number" min="0" max="40" value="12" /></div>
      <div class="grid"><label>对手作废总数</label><input id="enemy" type="number" min="0" max="30" value="3" /></div>
      <div class="grid"><label>单骰命中率 p(0~1)</label><input id="p" type="number" min="0" max="1" step="0.01" value="0.5" /></div>

      <div class="grid"><label>预热摇骰时长(ms)</label><input id="warmup" type="number" min="0" max="4000" value="700" /></div>
      <div class="grid"><label>每步揭示间隔(ms)</label><input id="stepDelay" type="number" min="20" max="1000" value="78" /></div>
      <div class="grid"><label>A池每步揭示颗数</label><input id="stepA" type="number" min="1" max="20" value="2" /></div>
      <div class="grid"><label>B池每步揭示颗数</label><input id="stepB" type="number" min="1" max="20" value="2" /></div>
      <div class="grid"><label>作废每步处理颗数</label><input id="stepVoid" type="number" min="1" max="10" value="1" /></div>
      <div class="grid"><label>展示模式</label>
        <select id="mode">
          <option value="abv">A池->B池->作废</option>
          <option value="mixv">A/B交替->作废</option>
        </select>
      </div>

      <div class="btn-row">
        <button class="primary" id="btnRun">开始动画</button>
        <button id="btnQuick">推荐参数（流畅）</button>
        <button id="btnHeavy">大骰池压测</button>
      </div>
      <p class="hint">
        说明：这是独立实验页，不含主玩法逻辑，只用于验证骰子动画“是否可见、是否流畅、节奏是否满意”。
      </p>
    </section>

    <section class="card">
      <h2>动画区</h2>
      <div class="phase"><span class="spinner"></span><span id="phaseText">待开始</span></div>
      <div class="pool">
        <h3>调查池</h3>
        <div id="rowA" class="row"></div>
      </div>
      <div class="pool">
        <h3>现场池</h3>
        <div id="rowB" class="row"></div>
      </div>
      <h2>调试日志</h2>
      <div id="log" class="log"></div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let running = false;

    function sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }
    function rint(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    const ROLL_FACES = ["✓", "×", "?", "", "", ""];
    function randomFace() { return ROLL_FACES[rint(0, ROLL_FACES.length - 1)]; }

    function log(msg) {
      const p = document.createElement("p");
      p.textContent = msg;
      $("log").prepend(p);
    }

    function mkDiceRow(rowEl, count) {
      rowEl.innerHTML = "";
      const arr = [];
      for (let i = 0; i < count; i++) {
        const d = document.createElement("span");
        d.className = "die rolling";
        setRollingFace(d, randomFace());
        rowEl.appendChild(d);
        arr.push(d);
      }
      return arr;
    }

    function setRollingFace(el, face) {
      el.textContent = face || "";
      if (face === "✓") {
        el.style.color = "#22c55e";
        el.style.borderColor = "#22c55e";
        el.style.boxShadow = "0 0 0 1px rgba(34,197,94,0.22) inset, 0 0 12px rgba(34,197,94,0.32)";
      } else if (face === "×") {
        el.style.color = "#ef4444";
        el.style.borderColor = "#ef4444";
        el.style.boxShadow = "0 0 0 1px rgba(239,68,68,0.2) inset, 0 0 12px rgba(239,68,68,0.28)";
      } else if (face === "?") {
        el.style.color = "#60a5fa";
        el.style.borderColor = "#60a5fa";
        el.style.boxShadow = "0 0 0 1px rgba(96,165,250,0.25) inset, 0 0 12px rgba(59,130,246,0.35)";
      } else {
        el.style.color = "#93c5fd";
        el.style.borderColor = "#94a3b8";
        el.style.boxShadow = "0 0 0 1px rgba(148,163,184,0.16) inset, 0 0 9px rgba(148,163,184,0.22)";
      }
    }

    function setDie(el, type) {
      el.style.borderColor = "";
      el.style.boxShadow = "";
      el.style.color = "";
      if (type === "rolling") {
        el.className = "die rolling";
        setRollingFace(el, randomFace());
        return;
      }
      if (type === "hit") {
        el.className = "die hit pop";
        el.textContent = "✓";
        return;
      }
      if (type === "miss") {
        el.className = "die miss pop";
        el.textContent = "×";
        return;
      }
      el.className = "die void pop";
      el.textContent = "";
    }

    function startRollingTicker() {
      return window.setInterval(() => {
        const dice = document.querySelectorAll(".die.rolling");
        dice.forEach((d) => {
          setRollingFace(d, randomFace());
        });
      }, 70);
    }

    function computeVoidSeq(nA, nB, enemy) {
      const all = [];
      for (let i = 0; i < nA; i++) all.push({ pool: "A", idx: i });
      for (let i = 0; i < nB; i++) all.push({ pool: "B", idx: i });
      for (let i = all.length - 1; i > 0; i--) {
        const j = rint(0, i);
        [all[i], all[j]] = [all[j], all[i]];
      }
      return all.slice(0, Math.min(enemy, all.length));
    }

    async function runAnim() {
      if (running) return;
      running = true;
      $("btnRun").disabled = true;
      $("phaseText").textContent = "准备中...";

      const nA = clamp(Number($("nA").value) || 0, 0, 40);
      const nB = clamp(Number($("nB").value) || 0, 0, 40);
      const enemy = clamp(Number($("enemy").value) || 0, 0, 30);
      const p = clamp(Number($("p").value) || 0.5, 0, 1);
      const warmup = clamp(Number($("warmup").value) || 0, 0, 4000);
      const stepDelay = clamp(Number($("stepDelay").value) || 78, 20, 1000);
      const stepA = clamp(Number($("stepA").value) || 2, 1, 20);
      const stepB = clamp(Number($("stepB").value) || 2, 1, 20);
      const stepVoid = clamp(Number($("stepVoid").value) || 1, 1, 10);
      const mode = $("mode").value;

      const rowA = mkDiceRow($("rowA"), nA);
      const rowB = mkDiceRow($("rowB"), nB);
      const hitA = Array.from({ length: nA }, () => Math.random() < p);
      const hitB = Array.from({ length: nB }, () => Math.random() < p);
      const voidSeq = computeVoidSeq(nA, nB, enemy);

      log(`开始：A=${nA}, B=${nB}, enemy=${enemy}, p=${p.toFixed(2)}`);
      $("phaseText").textContent = "摇骰中...";
      const ticker = startRollingTicker();
      await sleep(warmup);

      // reveal
      if (mode === "abv") {
        for (let i = 0; i < rowA.length; i += stepA) {
          const end = Math.min(rowA.length, i + stepA);
          $("phaseText").textContent = `调查池停骰 ${end}/${rowA.length}`;
          for (let k = i; k < end; k++) setDie(rowA[k], hitA[k] ? "hit" : "miss");
          await sleep(stepDelay);
        }
        for (let i = 0; i < rowB.length; i += stepB) {
          const end = Math.min(rowB.length, i + stepB);
          $("phaseText").textContent = `现场池停骰 ${end}/${rowB.length}`;
          for (let k = i; k < end; k++) setDie(rowB[k], hitB[k] ? "hit" : "miss");
          await sleep(stepDelay);
        }
      } else {
        let ia = 0, ib = 0;
        while (ia < rowA.length || ib < rowB.length) {
          if (ia < rowA.length) {
            const end = Math.min(rowA.length, ia + stepA);
            $("phaseText").textContent = `调查池停骰 ${end}/${rowA.length}`;
            for (let k = ia; k < end; k++) setDie(rowA[k], hitA[k] ? "hit" : "miss");
            ia = end;
          }
          await sleep(Math.floor(stepDelay * 0.6));
          if (ib < rowB.length) {
            const end = Math.min(rowB.length, ib + stepB);
            $("phaseText").textContent = `现场池停骰 ${end}/${rowB.length}`;
            for (let k = ib; k < end; k++) setDie(rowB[k], hitB[k] ? "hit" : "miss");
            ib = end;
          }
          await sleep(Math.floor(stepDelay * 0.6));
        }
      }

      await sleep(180);
      for (let i = 0; i < voidSeq.length; i += stepVoid) {
        const end = Math.min(voidSeq.length, i + stepVoid);
        $("phaseText").textContent = `对手作废中... ${end}/${voidSeq.length}`;
        for (let k = i; k < end; k++) {
          const s = voidSeq[k];
          const target = s.pool === "A" ? rowA[s.idx] : rowB[s.idx];
          if (target) setDie(target, "void");
        }
        await sleep(stepDelay + 12);
      }

      window.clearInterval(ticker);
      const count = (arr) => arr.filter((x) => x).length;
      $("phaseText").textContent = `完成：A命中${count(hitA)} / B命中${count(hitB)} / 作废${voidSeq.length}`;
      log($("phaseText").textContent);
      $("btnRun").disabled = false;
      running = false;
    }

    $("btnRun").onclick = runAnim;
    $("btnQuick").onclick = () => {
      $("nA").value = 18; $("nB").value = 12; $("enemy").value = 3; $("p").value = 0.50;
      $("warmup").value = 680; $("stepDelay").value = 72; $("stepA").value = 2; $("stepB").value = 2; $("stepVoid").value = 1;
      $("mode").value = "abv";
      log("已切到推荐参数（流畅）。");
    };
    $("btnHeavy").onclick = () => {
      $("nA").value = 28; $("nB").value = 22; $("enemy").value = 8; $("p").value = 0.45;
      $("warmup").value = 560; $("stepDelay").value = 56; $("stepA").value = 4; $("stepB").value = 4; $("stepVoid").value = 2;
      $("mode").value = "mixv";
      log("已切到大骰池压测参数。");
    };
  </script>
</body>
</html>
